{name:"Teriyaki Chicken Sushi Bowl",meal:"lunch-dinner",p:53,c:59,f:19,cal:624,ingredients:[{a:"150g",i:"Chicken thigh, skin-on"},{a:"125g",i:"Jasmine rice, microwaved"},{a:"15g",i:"Teriyaki sauce"},{a:"40g",i:"Cucumber"},{a:"125g",i:"Edamame beans"},{a:"30g",i:"Red cabbage"},{a:"1 sheet",i:"Nori, yaki"},{a:"10g",i:"Kewpie mayonnaise"},{a:"5g",i:"Seasoning"}],steps:["Cook chicken thigh in a pan. Add teriyaki sauce and toss to coat.","Heat rice according to package instructions.","Slice cucumber and shred cabbage.","Assemble a bowl with rice, chicken, edamame, cucumber and cabbage.","Crumble nori sheet over the top and sprinkle with seasoning.","Drizzle with mayo before serving."]},
{name:"Chicken & Quinoa Power Bowl",meal:"lunch-dinner",p:40,c:27,f:14,cal:394,ingredients:[{a:"150g",i:"Chicken thigh, skin-on"},{a:"150g",i:"Quinoa, cooked"},{a:"50g",i:"Cherry tomatoes"},{a:"50g",i:"Cucumber"},{a:"10g",i:"Olive oil"},{a:"10g",i:"Lemon juice"}],steps:["Cook chicken thigh until golden and cooked through. Slice.","Combine all ingredients in a bowl.","Drizzle with olive oil and lemon juice. Mix well and serve."]},
{name:"Basil & Tomato Protein Pasta",meal:"lunch-dinner",p:50,c:59,f:15,cal:573,ingredients:[{a:"100g",i:"Protein penne pasta"},{a:"85g",i:"Basil & tomato pasta sauce"},{a:"100g",i:"Lean beef mince"},{a:"80g",i:"Mixed vegetables, frozen"},{a:"5g",i:"Extra virgin olive oil"}],steps:["Cook pasta according to package instructions. Drain.","Heat olive oil in a pan and cook beef mince until browned.","Add mixed vegetables and cook until heated through.","Stir in pasta sauce and simmer briefly.","Toss cooked pasta with the sauce and serve."]},
{name:"Chicken Quesadilla",meal:"lunch-dinner",p:46,c:49,f:15,cal:524,ingredients:[{a:"100g",i:"Chicken thigh, skin-on"},{a:"71g",i:"Original wrap"},{a:"30g",i:"Full-fat cheddar, grated"},{a:"70g",i:"Black beans"},{a:"50g",i:"Red capsicum"},{a:"50g",i:"Tomato"},{a:"20g",i:"Corn kernels"},{a:"5g",i:"Taco spice mix"}],steps:["Cook chicken thigh with spice mix until fully cooked. Shred.","Dice capsicum and tomato.","On one half of the wrap, layer chicken, black beans, capsicum, tomato, corn and grated cheese.","Fold the wrap in half and cook in a non-stick pan until golden and cheese is melted.","Slice into wedges and serve."]},
{name:"Chicken Pesto Pasta",meal:"lunch-dinner",p:39,c:54,f:17,cal:535,ingredients:[{a:"65g",i:"Spiral pasta"},{a:"120g",i:"Chicken thigh, skin-on"},{a:"4g",i:"Extra virgin olive oil"},{a:"47g",i:"Basil pesto"},{a:"60g",i:"Green beans, fresh"},{a:"60g",i:"Cherry tomatoes"}],steps:["Cook pasta according to package instructions. Drain.","Steam green beans until tender-crisp.","In a pan, heat olive oil and toss cooked chicken, green beans and cherry tomatoes until warmed.","Stir in basil pesto, then combine with cooked pasta. Serve immediately."]},
{name:"Big Mac Bowl",meal:"lunch-dinner",p:55,c:36,f:11,cal:458,ingredients:[{a:"200g",i:"Extra lean beef mince"},{a:"200g",i:"Spudlite potato"},{a:"40g",i:"Iceberg lettuce"},{a:"50g",i:"Cherry tomatoes"},{a:"30g",i:"Burger pickles"},{a:"20g",i:"Red onion"},{a:"80g",i:"Full-fat Greek yoghurt"},{a:"20g",i:"Tomato sauce"},{a:"20g",i:"Sweet mustard pickles"}],steps:["Cut potato into small cubes and air fry or oven roast until crispy.","Cook beef mince with seasoning of choice until browned.","Chop lettuce, tomato, onion and pickles into small pieces.","Mix Greek yoghurt, tomato sauce, sweet mustard pickles and a splash of vinegar to make the sauce.","Add crispy potato to a bowl, top with mince.","Spread lettuce, tomato, onion and pickles over the top.","Drizzle the sauce over."]},
{name:"Loaded Potatoes",meal:"lunch-dinner",p:38,c:23,f:16,cal:392,ingredients:[{a:"200g",i:"Spudlite potato"},{a:"125g",i:"Extra lean beef mince"},{a:"25g",i:"Full-fat cheddar, shredded"},{a:"50g",i:"Lettuce, shredded"},{a:"20g",i:"Brown onion"},{a:"20g",i:"Burger pickles"},{a:"10g",i:"American mustard"},{a:"10g",i:"Tangy tomato sauce"}],steps:["Bake potatoes until soft. Cut open and lightly mash the insides.","Cook beef mince and diced onion in a non-stick pan until browned.","Fill potatoes with cooked mince and top with shredded cheese.","Add lettuce, pickles and drizzle with mustard and tangy tomato sauce."]},
{name:"Thai Chicken Noodle Salad",meal:"lunch-dinner",p:34,c:49,f:14,cal:452,ingredients:[{a:"40g",i:"Vermicelli rice noodles"},{a:"120g",i:"Oven roasted chicken, shredded"},{a:"15g",i:"Hoisin sauce"},{a:"10g",i:"Sriracha sauce"},{a:"10g",i:"Light soy sauce"},{a:"15g",i:"Peanut butter"},{a:"100g",i:"Red cabbage"},{a:"30g",i:"Red capsicum"},{a:"15g",i:"Spring onion"},{a:"5g",i:"Coriander"}],steps:["Mix hoisin, sriracha, soy sauce and peanut butter until smooth.","Soak noodles in warm water 2 minutes. Drain.","Slice cabbage, capsicum and spring onion.","Toss everything together with the sauce.","Top with coriander and a lime wedge if desired."]},
{name:"Simple Salmon & Veggies",meal:"lunch-dinner",p:37,c:24,f:35,cal:560,ingredients:[{a:"150g",i:"Salmon portions, skin off"},{a:"100g",i:"Asparagus, green"},{a:"150g",i:"Sweet potato, orange flesh"},{a:"10g",i:"Olive oil"},{a:"10g",i:"Lemon juice"}],steps:["Preheat oven to 200C.","Place salmon, asparagus and sweet potato on a baking tray.","Drizzle with olive oil and lemon juice. Season with salt and pepper.","Bake 15-20 minutes and serve."]},
{name:"Pesto Pasta Shells with Chicken & Mushroom",meal:"lunch-dinner",p:45,c:77,f:19,cal:665,ingredients:[{a:"100g",i:"Chicken thigh, cooked"},{a:"100g",i:"Pasta shells"},{a:"50g",i:"Mushroom"},{a:"50ml",i:"Salt-reduced chicken stock"},{a:"50g",i:"Basil pesto"}],steps:["Cook pasta shells according to package instructions. Drain.","In a pan, saute mushrooms with chicken stock until tender.","Add cooked chicken and basil pesto to the pan, stirring to combine.","Toss the mixture with cooked pasta shells and serve."]},
{name:"Butter-Basted Ribeye & Rice",meal:"dinner",p:52,c:62,f:28,cal:728,ingredients:[{a:"250g",i:"Ribeye steak"},{a:"30g",i:"Butter"},{a:"250g",i:"White rice, cooked"},{a:"3 cloves",i:"Garlic"},{a:"pinch",i:"Sea salt"}],steps:["Bring steak to room temperature. Season generously with sea salt.","Heat a cast iron pan until very hot. Sear steak 2 minutes each side.","Reduce heat. Add butter and garlic. Baste steak continuously for 2 minutes.","Rest 5 minutes before slicing. Serve with white rice."],coach:"Butter basting is the highest-quality fat delivery in the system. The Maillard reaction from the sear creates bioavailable zinc and iron compounds. One of the best meals in the database."},
{name:"Honey Garlic Chicken Thigh & Rice",meal:"dinner",p:46,c:64,f:14,cal:578,ingredients:[{a:"250g",i:"Chicken thigh, skin-on"},{a:"250g",i:"White rice, cooked"},{a:"2 tbsp",i:"Raw honey"},{a:"3 cloves",i:"Garlic, minced"},{a:"1 tbsp",i:"Butter"},{a:"pinch",i:"Sea salt"}],steps:["Season thighs with salt. Cook skin-side down in a pan over medium heat until golden.","Flip and add butter, garlic and honey. Baste for 2\u20133 minutes.","Cover and finish cooking until thighs are cooked through.","Serve over white rice with sauce poured over."],coach:"Honey-garlic is one of the most anti-inflammatory flavour combinations in the system. Garlic is a natural aromatase inhibitor \u2014 relevant for men over 40 looking to maintain testosterone:oestrogen ratio."},
{name:"Beef Mince Bolognese",meal:"dinner",p:48,c:62,f:12,cal:556,ingredients:[{a:"250g",i:"Extra lean beef mince"},{a:"200g",i:"White rice pasta or sourdough pasta"},{a:"150ml",i:"Passata"},{a:"1 medium",i:"Brown onion, diced"},{a:"3 cloves",i:"Garlic, minced"},{a:"15g",i:"Butter"},{a:"30g",i:"Parmigiano Reggiano, grated"},{a:"pinch",i:"Sea salt"}],steps:["Cook pasta according to package instructions. Drain.","In a pan, melt butter and soften onion and garlic.","Add beef mince and cook until browned.","Add passata, simmer 10 minutes. Season with salt.","Serve over pasta, topped with Parmigiano Reggiano."],coach:"Parmigiano Reggiano is the only cheese used in pasta dishes in this system. Its tyrosine content makes it genuinely functional \u2014 not just flavour. Do not substitute with processed cheese."},
{name:"Prawn Stir-Fry & Rice",meal:"dinner",p:38,c:64,f:8,cal:484,ingredients:[{a:"200g",i:"Prawns, raw"},{a:"250g",i:"White rice, cooked"},{a:"100g",i:"Bok choy"},{a:"1 tbsp",i:"Butter"},{a:"1 tbsp",i:"Raw honey"},{a:"1 tbsp",i:"Tamari or light soy sauce"},{a:"pinch",i:"Sea salt"}],steps:["Melt butter in a wok over high heat.","Add prawns and stir-fry until pink, 2\u20133 minutes.","Add bok choy and drizzle with honey and soy sauce. Toss 1 minute.","Serve over white rice."],coach:"Prawns are selenium-rich \u2014 critical for thyroid conversion of T4 to active T3. Bok choy provides calcium without the oxalate burden of spinach. A solid thyroid-supportive dinner."},
{name:"Slow Roast Lamb & Potato",meal:"dinner",p:48,c:44,f:20,cal:552,ingredients:[{a:"250g",i:"Lamb shoulder or leg"},{a:"250g",i:"Potato, halved"},{a:"20g",i:"Butter"},{a:"1 tbsp",i:"Raw honey"},{a:"1 tsp",i:"Sea salt"},{a:"3 cloves",i:"Garlic"}],steps:["Preheat oven to 160\u00b0C. Season lamb with salt.","Place lamb in a roasting dish with garlic and potatoes.","Drizzle honey and dot with butter.","Roast for 2.5\u20133 hours until meat pulls easily.","Serve lamb with roasted potatoes and pan juices."],coach:"Slow roasting breaks down collagen into glycine \u2014 one of the most anti-inflammatory and sleep-supporting amino acids. Lamb shanks, shoulder and neck are preferred for this reason over lean cuts for slow cooking."},
{name:"Salmon with Honey Butter Glaze & Greens",meal:"dinner",p:42,c:12,f:24,cal:444,ingredients:[{a:"200g",i:"Salmon fillet"},{a:"20g",i:"Butter"},{a:"1 tbsp",i:"Raw honey"},{a:"100g",i:"Broccolini, steamed"},{a:"pinch",i:"Sea salt"}],steps:["Season salmon with salt.","Melt butter in a pan over medium heat. Brush salmon with honey.","Cook salmon 3\u20134 minutes per side until just cooked through.","Steam broccolini until tender-crisp.","Plate salmon and broccolini. Pour pan butter over both."],coach:"Broccolini contains DIM (diindolylmethane) which supports healthy oestrogen metabolism \u2014 relevant for the anti-oestrogenic goals of the Ignition Protocol."},
{name:"Beef Stew with Potato",meal:"dinner",p:44,c:48,f:12,cal:484,ingredients:[{a:"250g",i:"Beef chuck, cubed"},{a:"250g",i:"Potato, diced"},{a:"200ml",i:"Beef bone broth"},{a:"1 medium",i:"Carrot, diced (cooked)"},{a:"1 medium",i:"Brown onion, diced"},{a:"15g",i:"Butter"},{a:"pinch",i:"Sea salt"}],steps:["Brown beef in butter in a heavy pot. Season with salt.","Add onion and cook until soft.","Add broth, potato and carrot. Bring to a boil.","Reduce heat and simmer covered for 1.5\u20132 hours until beef is tender.","Serve in bowls."],coach:"Bone broth provides glycine, proline and hydroxyproline \u2014 the building blocks of collagen. This is the anti-inflammatory amino acid stack most men over 40 are deficient in. Stews are one of the best vehicles for collagen delivery."},
{name:"Chicken Liver P\u00e2t\u00e9 on Sourdough",meal:"dinner",p:22,c:32,f:18,cal:384,ingredients:[{a:"150g",i:"Chicken livers"},{a:"20g",i:"Butter"},{a:"1 small",i:"Brown onion"},{a:"1 tbsp",i:"Raw honey"},{a:"2 slices",i:"Sourdough"},{a:"pinch",i:"Sea salt"}],steps:["Melt butter in a pan. Cook onion until soft.","Add chicken livers and cook until just done \u2014 still slightly pink inside.","Add honey and stir. Transfer to a blender.","Blend until smooth. Season with salt.","Spread thickly on toasted sourdough."],coach:"Chicken livers are almost as nutrient-dense as beef liver and far more approachable in taste. The honey balances the metallic edge and contributes fructose for liver glycogen. A high-performance dinner that most men would never expect."},
{name:"Steak & Mash",meal:"dinner",p:65,c:35,f:9,cal:484,ingredients:[{a:"250g",i:"Beef scotch fillet, lean"},{a:"150g",i:"Green beans, boiled"},{a:"250g",i:"Spudlite potato"},{a:"100g",i:"Brown onion gravy"}],steps:["Prepare gravy according to package instructions. Keep warm.","Boil and mash potatoes. Season with salt.","Steam green beans until tender.","Season steak and cook in a hot pan to desired doneness. Rest 5 minutes.","Plate mash, steak and beans. Pour gravy over."]},
{name:"Grilled Barramundi, Potato & Asparagus",meal:"dinner",p:54,c:24,f:19,cal:488,ingredients:[{a:"250g",i:"Barramundi fillet"},{a:"250g",i:"Spudlite potato"},{a:"100g",i:"Asparagus, green"},{a:"5g",i:"Extra virgin olive oil"}],steps:["Preheat oven or grill. Season barramundi with salt and pepper.","Boil or roast potatoes until tender.","Brush barramundi with olive oil and grill 4-5 minutes per side until cooked through.","Steam asparagus until tender-crisp.","Plate barramundi with potatoes and asparagus."]},
{name:"Thai Green Chicken Curry",meal:"dinner",p:43,c:53,f:40,cal:760,ingredients:[{a:"150g",i:"Chicken thigh, skin-on"},{a:"150ml",i:"Light coconut milk"},{a:"10g",i:"Thai green curry paste"},{a:"10g",i:"Vegetable oil"},{a:"5g",i:"Fish sauce"},{a:"50g",i:"Red capsicum"},{a:"50g",i:"Zucchini, cooked"},{a:"50g",i:"Snow peas"},{a:"50g",i:"Jasmine rice, raw"}],steps:["Cook rice on stove or in rice cooker.","Cut chicken thigh and vegetables into bite-sized pieces.","Heat oil in a pan over medium heat. Add curry paste and stir-fry until fragrant.","Add chicken and stir to coat.","Add coconut milk and stir to combine. Bring to a gentle simmer.","Stir in fish sauce and add vegetables. Simmer until chicken is cooked through.","Serve over rice."]},
{name:"Teriyaki Chicken & Rice",meal:"dinner",p:48,c:81,f:14,cal:638,ingredients:[{a:"5g",i:"Sesame oil"},{a:"190g",i:"Chicken thigh, skin-on"},{a:"5g",i:"Garlic, fresh"},{a:"5g",i:"Ginger, fresh"},{a:"10g",i:"Raw honey"},{a:"10g",i:"Light soy sauce"},{a:"5g",i:"Rice wine vinegar"},{a:"5g",i:"Sesame seeds"},{a:"150g",i:"Bok choy"},{a:"200g",i:"White rice, cooked"}],steps:["Heat sesame oil in a pan over medium heat.","Add chicken thigh and fry 7 minutes until golden.","Add garlic and ginger. Cook 2 minutes.","Stir in honey, soy sauce, vinegar and 100ml water. Bring to a boil and cook 2-5 minutes until sticky.","Blanch bok choy in boiling water 1-2 minutes. Drain.","Serve chicken over rice with bok choy. Top with sesame seeds."]},
{name:"Rump Steak & Potato",meal:"dinner",p:55,c:56,f:8,cal:516,ingredients:[{a:"220g",i:"Beef rump steak, lean"},{a:"300g",i:"Potato, new"},{a:"80g",i:"Corn on the cob"},{a:"20g",i:"BBQ sauce, reduced salt"}],steps:["Boil or steam potatoes until tender.","Grill or pan-sear steak to desired doneness. Rest 5 minutes.","Cook corn until tender.","Plate steak, potatoes and corn. Serve with BBQ sauce."]},
{name:"Steak, Sweet Potato & Veg",meal:"dinner",p:39,c:43,f:10,cal:414,ingredients:[{a:"150g",i:"Beef rump steak, lean"},{a:"250g",i:"Sweet potato, orange flesh"},{a:"150g",i:"Winter veg mix"},{a:"55g",i:"Peppercorn cream sauce"}],steps:["Peel and dice sweet potato. Steam or boil until tender.","Cook steak in a hot pan to desired doneness. Rest 5 minutes.","Steam winter veg mix until tender.","Heat peppercorn sauce according to package instructions.","Plate steak with sweet potato and vegetables. Drizzle with sauce."]},
{name:"Steak, Potatoes & Veg",meal:"dinner",p:39,c:21,f:14,cal:370,ingredients:[{a:"150g",i:"Beef rump steak, lean"},{a:"200g",i:"Spudlite potato"},{a:"80g",i:"Broccoli, fresh"},{a:"80g",i:"Green beans, fresh"},{a:"10g",i:"Butter"}],steps:["Boil or steam potatoes until tender. Mash with butter.","Steam broccoli and green beans until cooked but still crisp.","Cook steak in a hot pan to desired doneness. Rest 5 minutes.","Plate steak with mashed potatoes and steamed vegetables."]},
{name:"Beef Stroganoff",meal:"dinner",p:175,c:110,f:46,cal:1580,ingredients:[{a:"600g",i:"Beef stir-fry strips"},{a:"220g",i:"Egg fettuccine"},{a:"30g",i:"Plain flour"},{a:"250ml",i:"Beef bone broth"},{a:"120g",i:"Full-fat sour cream"},{a:"5g",i:"Extra virgin olive oil"},{a:"150g",i:"Mushroom"},{a:"150g",i:"Brown onion"}],steps:["Cook fettuccine according to package instructions. Drain.","Heat olive oil in a pan and saute sliced onion and mushrooms until softened.","Toss beef strips in flour, then add to the pan and cook until browned.","Stir in beef bone broth and simmer until sauce thickens.","Remove from heat and stir in sour cream until combined.","Serve beef stroganoff over the cooked fettuccine."],coach:"Batch recipe -- serves 4. Divide all macros by 4 for per-serve totals."},
{name:"Thai Prawn Red Curry",meal:"dinner",p:92,c:43,f:32,cal:825,ingredients:[{a:"10g",i:"Olive oil"},{a:"200g",i:"Brown onion"},{a:"20g",i:"Ginger, fresh"},{a:"30g",i:"Thai red curry paste"},{a:"400g",i:"Crushed tomatoes"},{a:"250ml",i:"Light coconut cream"},{a:"400g",i:"Prawns, raw"}],steps:["Heat oil in a saucepan. Add onion and ginger. Cook until soft.","Stir in curry paste and cook 1 minute.","Add crushed tomatoes and coconut cream. Bring to a boil and simmer 5 minutes.","Add prawns and cook 5-10 minutes until done.","Serve with plain rice and chopped coriander if desired."],coach:"Batch recipe -- serves 4. Divide all macros by 4 for per-serve totals."},
{name:"Carrot & Lentil Soup",meal:"dinner",p:15,c:33,f:12,cal:300,ingredients:[{a:"60g",i:"Red lentils, dry"},{a:"1g",i:"Cumin seeds"},{a:"5g",i:"Olive oil"},{a:"15g",i:"Carrot"},{a:"250ml",i:"Vegetable stock"},{a:"30ml",i:"Light coconut milk"}],steps:["Toast cumin seeds 1 minute until fragrant.","Add oil, carrots, lentils, stock and coconut milk. Bring to a boil.","Simmer 15 minutes until lentils are soft.","Blend until smooth or leave chunky.","Serve with warm bread or preferred side."]},
{name:"Pumpkin Soup",meal:"dinner",p:31,c:109,f:9,cal:639,ingredients:[{a:"1200g",i:"Butternut pumpkin, peeled"},{a:"250g",i:"Brown onion"},{a:"10g",i:"Garlic, fresh"},{a:"750ml",i:"Vegetable stock"},{a:"5g",i:"Parsley, fresh"}],steps:["Peel and remove seeds from pumpkin. Cut into 4cm chunks.","In a pot, combine pumpkin, onion, garlic and stock. Boil then simmer until pumpkin is soft, roughly 10 minutes.","Remove from heat and blend until smooth.","Season with salt and pepper. Stir in a splash of cream.","Serve in bowls garnished with cream, pepper and parsley."],coach:"Batch recipe -- serves 4. Divide all macros by 4 for per-serve totals."},
{name:"Slow Cooker BBQ Pulled Chicken",meal:"dinner",p:35,c:41,f:6,cal:359,ingredients:[{a:"150g",i:"Chicken thigh, skin-on"},{a:"60g",i:"BBQ sauce"},{a:"20g",i:"Brown onion"},{a:"5g",i:"Olive oil"},{a:"5g",i:"Worcestershire sauce"},{a:"5g",i:"Brown sugar"}],steps:["Grate onion.","In a slow cooker, mix BBQ sauce, onion, olive oil, Worcestershire sauce and brown sugar.","Add chicken thigh and turn to coat in the sauce.","Cover and cook on high 2-3 hours or low 6-7 hours until chicken is cooked through and easy to shred.","Remove chicken, shred with two forks, return to the sauce and stir well. Serve warm."]},
{name:"Slow Cooker Beef and Sweet Potato Stew",meal:"dinner",p:39,c:22,f:10,cal:333,ingredients:[{a:"150g",i:"Beef chuck, lean"},{a:"100g",i:"Sweet potato, orange flesh"},{a:"50g",i:"Carrot"},{a:"30g",i:"Celery"},{a:"50g",i:"Mushroom"},{a:"30g",i:"Brown onion"},{a:"100ml",i:"Salt-reduced beef stock"},{a:"5g",i:"Worcestershire sauce"},{a:"5g",i:"Olive oil"}],steps:["Season beef with salt and pepper. Sear in olive oil until browned.","Add beef, diced sweet potato, carrot, celery, mushroom and onion to the slow cooker.","Pour beef stock and Worcestershire sauce over everything.","Cover and cook on low 8-10 hours until beef is tender.","Shred beef and stir through the stew before serving."]},
{name:"Slow Cooker Chicken Tikka Masala",meal:"dinner",p:33,c:13,f:16,cal:325,ingredients:[{a:"150g",i:"Chicken thigh, skin-on"},{a:"15g",i:"Tikka masala paste"},{a:"125g",i:"Passata"},{a:"5g",i:"Tomato puree"},{a:"5g",i:"Olive oil"},{a:"30g",i:"Brown onion"},{a:"5g",i:"Garlic, minced"},{a:"5g",i:"Ginger, fresh"},{a:"20g",i:"Full-fat thickened cream"},{a:"5g",i:"Coriander, fresh"}],steps:["Dice chicken thigh and season with salt. Sear in oil until lightly browned.","Add onion, garlic and ginger to the pan. Cook until softened.","Transfer chicken and vegetables to a slow cooker.","Add tikka paste, passata and tomato puree. Stir well.","Cover and cook on low 5-7 hours or high 4-5 hours.","Stir in cream and cook a further 10-15 minutes. Garnish with coriander."]},
{name:"Slow Cooker Mexican Beef Bowls",meal:"dinner",p:37,c:7,f:11,cal:271,ingredients:[{a:"150g",i:"Beef chuck, lean"},{a:"100g",i:"Crushed tomatoes"},{a:"100ml",i:"Salt-reduced beef stock"},{a:"5g",i:"Tomato paste"},{a:"5g",i:"Olive oil"},{a:"2g",i:"Cumin"},{a:"2g",i:"Paprika"},{a:"2g",i:"Dried oregano"},{a:"5g",i:"Lime juice"}],steps:["Rub beef with cumin, paprika, oregano, salt and olive oil.","Sear beef in a hot pan until browned on all sides.","Cook tomato paste in the same pan 1 minute.","Add crushed tomatoes, beef stock and lime juice. Stir well.","Transfer beef and sauce to a slow cooker.","Cook on low 8 hours or high 4 hours until beef falls apart.","Shred beef with two forks and stir into sauce before serving."]},
{name:"Slow Cooker Creamy Garlic Chicken",meal:"dinner",p:38,c:7,f:16,cal:322,ingredients:[{a:"150g",i:"Chicken thigh, skin-on"},{a:"5g",i:"Garlic, fresh"},{a:"100ml",i:"Salt-reduced chicken stock"},{a:"5g",i:"Olive oil"},{a:"2g",i:"Dried thyme"},{a:"5g",i:"Cornflour"},{a:"5ml",i:"Water"},{a:"10g",i:"Parmigiano Reggiano, grated"},{a:"20g",i:"Full-fat thickened cream"}],steps:["Season chicken with salt and pepper. Sear in olive oil until golden on both sides.","Transfer to slow cooker. Lightly cook garlic in the same pan, then add stock and thyme. Bring to a simmer.","Pour over chicken. Cover and cook on high 4-5 hours.","Mix cornstarch with water. Stir into slow cooker with Parmigiano and cream.","Cook 20 minutes longer until sauce thickens."]},
{name:"Slow Cooker Teriyaki Beef",meal:"dinner",p:32,c:21,f:4,cal:253,ingredients:[{a:"150g",i:"Beef rump steak, lean"},{a:"20g",i:"Raw honey"},{a:"15g",i:"Light soy sauce"},{a:"15ml",i:"Salt-reduced beef stock"},{a:"15g",i:"Rice wine vinegar"},{a:"5g",i:"Garlic, fresh"},{a:"5g",i:"Ginger, fresh"},{a:"5g",i:"Cornflour"}],steps:["Lightly brown beef strips in a pan.","In a slow cooker, combine honey, soy sauce, beef stock, rice wine vinegar, garlic, ginger and black pepper.","Add beef strips and stir to coat.","Cover and cook on low 6-8 hours until beef is tender.","Mix cornstarch with water. Stir into slow cooker to thicken sauce.","Cook on high a further 15 minutes. Serve hot."]},
{name:"Slow Cooker Lemon Herb Chicken",meal:"dinner",p:35,c:2,f:7,cal:207,ingredients:[{a:"150g",i:"Chicken thigh, skin-on"},{a:"5g",i:"Garlic, fresh"},{a:"20g",i:"Lemon juice"},{a:"5g",i:"Dijon mustard"},{a:"2g",i:"Salt"},{a:"5g",i:"Olive oil"},{a:"2g",i:"Italian herbs"}],steps:["Whisk garlic, lemon juice, mustard, salt, olive oil and Italian seasoning to make the sauce.","Add chicken thigh and 2 tablespoons of sauce to the slow cooker.","Cover and cook on low 4-5 hours or high 3-4 hours.","Remove chicken, shred with forks, stir back into the slow cooker with remaining sauce."]},
{name:"Balsamic Barramundi, Potatoes & Veggies",meal:"dinner",p:36,c:42,f:8,cal:388,ingredients:[{a:"150g",i:"Barramundi fillet"},{a:"150g",i:"Green beans, fresh"},{a:"10g",i:"Tomato"},{a:"300g",i:"Spudlite potato"},{a:"20g",i:"Balsamic glaze"}],steps:["Season barramundi fillets with salt and pepper.","Cook over medium-high heat 4-6 minutes per side until they flake easily. Remove and keep warm.","Add green beans and tomatoes to the skillet and cook until softened, 2-4 minutes.","Stir in balsamic glaze and cook on medium-low until thickened.","Serve fish topped with the veggie mixture alongside boiled potatoes."]},
{name:"Raw Carrot with Honey & Salt",meal:"snack",p:2,c:22,f:0,cal:96,ingredients:[{a:"2 medium",i:"Carrots, grated raw"},{a:"1 tsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Grate carrots raw \u2014 never cook.","Arrange on a plate or in a bowl.","Drizzle honey over the top.","Add a pinch of sea salt."],coach:"The daily raw carrot is a cornerstone of the Ignition Protocol. It is the single most effective gut-cleansing tool in the system \u2014 the unique non-soluble fibre binds to endotoxins and excess oestrogen. Honey and salt make it something you'll actually want to eat."},
{name:"Milk & Honey",meal:"snack",p:8,c:28,f:8,cal:220,ingredients:[{a:"300ml",i:"Full-fat milk"},{a:"2 tbsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Pour cold milk into a glass.","Stir in honey until dissolved.","Add a pinch of sea salt.","Drink immediately."],coach:"The simplest and most restorative snack in the system. The sodium and glucose combination in milk-honey-salt drives cellular energy production \u2014 ideal mid-afternoon when cortisol drops."},
{name:"Sourdough, Butter & Honey",meal:"snack",p:8,c:38,f:12,cal:296,ingredients:[{a:"2 slices",i:"Sourdough bread"},{a:"20g",i:"Butter"},{a:"2 tbsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Toast sourdough until golden.","Spread butter generously while hot.","Drizzle raw honey over both slices.","Add a pinch of sea salt."],coach:"Butter and honey on sourdough is the ideal mid-afternoon snack \u2014 fat for satiety, simple carbohydrate for sustained energy. The salt supports cellular glucose uptake."},
{name:"Cottage Cheese & Honey",meal:"snack",p:22,c:18,f:6,cal:218,ingredients:[{a:"200g",i:"Full-fat cottage cheese"},{a:"1 tbsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Spoon cottage cheese into a bowl.","Drizzle honey over the top.","Add a pinch of sea salt.","Eat immediately."],coach:"High-casein protein snack with minimal carbohydrate. The honey provides just enough glucose to prevent cortisol elevation between meals. Salt enhances palatability and supports adrenal function."},
{name:"Boiled Eggs with Salt",meal:"snack",p:18,c:2,f:12,cal:192,ingredients:[{a:"3 large",i:"Eggs"},{a:"pinch",i:"Sea salt"}],steps:["Place eggs in cold water. Bring to a boil.","Boil 7 minutes for firm yolks.","Cool in cold water. Peel.","Season with sea salt."],coach:"The most portable snack in the system. Egg yolks contain choline \u2014 essential for liver fat metabolism and cognitive function. Do not discard yolks."},
{name:"Banana with Salt",meal:"snack",p:2,c:28,f:0,cal:120,ingredients:[{a:"2 medium",i:"Bananas"},{a:"pinch",i:"Sea salt"}],steps:["Peel bananas.","Eat with a pinch of sea salt alongside."],coach:"Bananas are the fastest-absorbing fruit in the system. The potassium-sodium pairing (banana + salt) is one of the best electrolyte combinations for men training intensely. Quick pre-workout option if you forgot to eat."},
{name:"Parmigiano & Apple",meal:"snack",p:14,c:24,f:10,cal:246,ingredients:[{a:"40g",i:"Parmigiano Reggiano"},{a:"1 medium",i:"Apple, sliced"},{a:"pinch",i:"Sea salt"}],steps:["Slice Parmigiano into shards.","Slice apple thinly.","Arrange on a board.","Add a pinch of sea salt."],coach:"One of the most satisfying and protocol-aligned snacks. Parmigiano provides tyrosine and protein; apple provides pectin and fructose. The sweet-savoury contrast makes this surprisingly compelling."},
{name:"Mango & Cottage Cheese",meal:"snack",p:20,c:32,f:5,cal:253,ingredients:[{a:"150g",i:"Mango, diced"},{a:"200g",i:"Full-fat cottage cheese"},{a:"pinch",i:"Sea salt"}],steps:["Dice mango into bite-sized pieces.","Spoon cottage cheese into a bowl.","Top with mango.","Add a pinch of sea salt."],coach:"B-vitamin-rich mango with high-protein cottage cheese. An afternoon snack that keeps insulin stable while providing enough carbohydrate to prevent cortisol elevation."},
{name:"Warm Honey Milk (Mid-Day)",meal:"snack",p:8,c:28,f:8,cal:220,ingredients:[{a:"300ml",i:"Full-fat milk"},{a:"2 tbsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Warm milk gently on the stove.","Stir in honey and sea salt until dissolved.","Drink warm."],coach:"Identical to the pre-sleep drink but consumed mid-day during rest or recovery phases. Particularly useful on rest days when cortisol management is important but training stimulus is absent."},
{name:"Vanilla Pudding with Mango",meal:"snack",p:27,c:38,f:2,cal:280,ingredients:[{a:"17g",i:"Instant vanilla pudding"},{a:"150g",i:"Full-fat Greek yoghurt"},{a:"20g",i:"Custard casein protein, vanilla"},{a:"100g",i:"Mango, frozen"}],steps:["Prepare vanilla pudding according to package instructions.","Mix Greek yoghurt and casein protein until smooth.","Layer the pudding, yoghurt mixture and mango in a serving dish.","Refrigerate until chilled and serve."]},
{name:"Granola, Yoghurt & Fruit",meal:"snack",p:20,c:55,f:19,cal:473,ingredients:[{a:"50g",i:"Low sugar raspberry coconut granola"},{a:"80g",i:"Full-fat vanilla yoghurt"},{a:"20g",i:"Almond butter"},{a:"120g",i:"Banana"}],steps:["Layer yoghurt and granola in a serving bowl.","Slice banana and arrange on top.","Drizzle almond butter over the bowl before serving."]},
{name:"Yoghurt Bowl - Chocolate & Berry",meal:"snack",p:24,c:45,f:6,cal:327,ingredients:[{a:"250g",i:"Full-fat vanilla yoghurt"},{a:"100g",i:"Frozen mixed berries"},{a:"15g",i:"Dark chocolate chips (97% sugar-free)"},{a:"15g",i:"Raw honey"}],steps:["Place yoghurt in a bowl.","Top with frozen mixed berries.","Sprinkle dark chocolate chips over the top.","Drizzle with honey to finish."]},
{name:"Berry Yogurt Parfait",meal:"snack",p:19,c:53,f:6,cal:343,ingredients:[{a:"150g",i:"Full-fat Greek yoghurt"},{a:"15g",i:"Raw honey"},{a:"100g",i:"Frozen mixed berries"},{a:"50g",i:"Blueberry granola"}],steps:["Layer yoghurt at the bottom of a glass.","Add a layer of mixed berries.","Sprinkle granola over berries.","Drizzle with honey.","Repeat layers if desired."]},
{name:"Berry & Nut Butter Yoghurt Bowl",meal:"snack",p:21,c:15,f:9,cal:229,ingredients:[{a:"160g",i:"Full-fat strawberry yoghurt"},{a:"100g",i:"Frozen mixed berries"},{a:"2g",i:"Cinnamon"},{a:"15g",i:"Almond butter"},{a:"5g",i:"Sugar-free maple syrup"}],steps:["Place yoghurt in a bowl.","Top with frozen mixed berries.","Drizzle almond butter and sugar-free maple syrup over the top.","Sprinkle with cinnamon before serving."]},
{name:"Apple Crumble Yogurt Bowl",meal:"snack",p:12,c:47,f:3,cal:265,ingredients:[{a:"100g",i:"Apple, red skin"},{a:"100g",i:"Full-fat vanilla yoghurt"},{a:"30g",i:"Rolled oats"},{a:"5g",i:"Cinnamon"},{a:"10g",i:"Raw honey"}],steps:["Dice apple and cook in a pan over low heat until soft. Add cinnamon.","Toast oats in a dry pan until golden.","Layer yoghurt, warm cinnamon apples and toasted oats in a bowl.","Drizzle honey over the top."]},
{name:"Anzac Biscuit Yogurt Parfait",meal:"snack",p:12,c:35,f:9,cal:273,ingredients:[{a:"1",i:"ANZAC biscuit"},{a:"100g",i:"Full-fat Greek yoghurt"},{a:"5g",i:"Raw honey"},{a:"50g",i:"Banana"},{a:"5g",i:"Desiccated coconut"}],steps:["Crush ANZAC biscuit into small crumbs.","Layer half the yoghurt, then half the biscuit crumbs in a jar.","Add sliced banana, then repeat layers.","Drizzle honey over the top and sprinkle with coconut.","Chill or serve immediately."]},
{name:"Chocolate Banana Protein Mousse",meal:"snack",p:38,c:33,f:2,cal:301,ingredients:[{a:"100g",i:"Banana"},{a:"100g",i:"Full-fat Greek yoghurt"},{a:"30g",i:"Whey protein isolate"},{a:"10g",i:"Cocoa powder"},{a:"10g",i:"Raw honey"}],steps:["Blend banana, yoghurt, protein powder and cocoa powder until smooth.","Add honey and mix well.","Refrigerate 1 hour for a thick mousse-like texture.","Serve chilled."]},
{name:"Coconut Oat Protein Balls",meal:"snack",p:25,c:26,f:18,cal:361,ingredients:[{a:"30g",i:"Rolled oats"},{a:"10g",i:"Desiccated coconut"},{a:"10g",i:"Raw honey"},{a:"16g",i:"Peanut butter, smooth"},{a:"20g",i:"Whey protein isolate"},{a:"10ml",i:"Water"}],steps:["Add oats, coconut and protein powder to a bowl.","Stir in peanut butter and honey.","Add water gradually and mix until combined.","Roll into small balls.","Refrigerate for 30 minutes to set."]},
{name:"Chocolate Chip Muffins",meal:"snack",p:6,c:21,f:5,cal:149,ingredients:[{a:"25g",i:"Plain flour"},{a:"1g",i:"Baking powder"},{a:"25ml",i:"Full-fat milk"},{a:"8g",i:"Egg, whole"},{a:"13g",i:"Dark chocolate chips (97% sugar-free)"}],steps:["Preheat oven to 180C.","Mix flour and baking powder in a bowl.","Stir in milk and egg until just combined.","Fold in chocolate chips.","Spoon into muffin tray and bake 20-25 minutes."],coach:"Batch recipe. Divide total macros by number of serves."},
{name:"Banana Oat Cookies",meal:"snack",p:4,c:20,f:4,cal:132,ingredients:[{a:"33g",i:"Banana, mashed"},{a:"17g",i:"Rolled oats"},{a:"5g",i:"Raw honey"},{a:"1g",i:"Cinnamon"},{a:"8g",i:"Dark chocolate chips (97% sugar-free)"}],steps:["Mash bananas in a bowl.","Stir in oats, honey, cinnamon and chocolate chips.","Scoop onto lined baking tray.","Bake at 180C for 15 minutes.","Cool before serving."],coach:"Batch recipe. Divide total macros by number of serves."},
{name:"Easy Protein Mug Cake",meal:"snack",p:31,c:20,f:6,cal:259,ingredients:[{a:"30g",i:"Whey protein isolate"},{a:"20g",i:"Plain flour"},{a:"50ml",i:"Full-fat milk"},{a:"3g",i:"Baking powder"},{a:"20g",i:"Dark chocolate chips (97% sugar-free)"}],steps:["Mix protein, flour, milk, baking powder and chocolate chips in a mug.","Microwave on high for 45-60 seconds.","Cool slightly before eating."]},
{name:"Lava Chocolate Mug Cake",meal:"snack",p:29,c:11,f:4,cal:195,ingredients:[{a:"30g",i:"Whey protein isolate"},{a:"12g",i:"Cocoa powder"},{a:"6g",i:"Arrowroot flour"},{a:"3g",i:"Baking powder"},{a:"90ml",i:"Full-fat milk"},{a:"5g",i:"Vanilla extract"},{a:"5g",i:"White chocolate baking chips"},{a:"20g",i:"Strawberries"}],steps:["Mix dry ingredients in a small bowl.","Add milk and vanilla extract. Mix until smooth.","Lightly spray a microwave-safe mug, pour in batter and sprinkle chocolate chips on top.","Microwave for 60-80 seconds.","Serve warm. Top with strawberry."]},
{name:"Peanut Butter Chocolate Chia Pudding",meal:"snack",p:9,c:13,f:17,cal:244,ingredients:[{a:"150ml",i:"Full-fat milk"},{a:"20g",i:"Chia seeds"},{a:"10g",i:"Cocoa powder"},{a:"15g",i:"Peanut butter, smooth"},{a:"10g",i:"Raw honey"}],steps:["Mix milk, chia seeds, cocoa powder, peanut butter and honey in a bowl.","Stir well and let sit 5 minutes. Stir again to prevent clumping.","Cover and refrigerate at least 2 hours or overnight.","Serve chilled."]},
{name:"Vanilla Almond Oat Cookies",meal:"snack",p:33,c:53,f:19,cal:513,ingredients:[{a:"80g",i:"Rolled oats"},{a:"20g",i:"Whey protein isolate"},{a:"20g",i:"Almond butter"},{a:"15g",i:"Raw honey"},{a:"50ml",i:"Full-fat milk"}],steps:["Preheat oven to 180C.","Mix oats, protein powder, almond butter, honey and milk in a bowl.","Scoop dough onto a lined baking tray, shaping into small cookies.","Bake 12-15 minutes until golden brown.","Cool before serving."],coach:"Batch recipe. Divide total macros by number of serves."},
{name:"Strawberry Cheesecake Protein Bites",meal:"snack",p:27,c:36,f:21,cal:443,ingredients:[{a:"50g",i:"Strawberries, fresh"},{a:"80g",i:"Full-fat cream cheese block"},{a:"20g",i:"Whey protein isolate"},{a:"40g",i:"Rolled oats"},{a:"15g",i:"Raw honey"}],steps:["Mash strawberries in a bowl.","Mix in cream cheese, protein powder and honey.","Blend oats until fine, then mix into the batter.","Roll into bite-sized balls and refrigerate 30 minutes before serving."],coach:"Batch recipe. Divide total macros by number of serves."},
{name:"Coconut Oat Protein Bake",meal:"snack",p:28,c:35,f:13,cal:368,ingredients:[{a:"50g",i:"Rolled oats"},{a:"25g",i:"Whey protein isolate"},{a:"10g",i:"Raw honey"},{a:"1g",i:"Cinnamon"},{a:"5g",i:"Chia seeds"},{a:"20ml",i:"Water"},{a:"10g",i:"Desiccated coconut"},{a:"2g",i:"Baking powder"}],steps:["Preheat oven to 180C.","In a bowl, mix oats, protein powder, chia seeds, coconut, cinnamon and baking powder.","Stir in honey and water until combined.","Pour into a small baking dish.","Bake 20-25 minutes until golden and firm.","Cool slightly before serving."]},
{name:"Peanut Butter & Berry Smoothie Bowl",meal:"snack",p:33,c:30,f:13,cal:369,ingredients:[{a:"100g",i:"Frozen mixed berries"},{a:"50g",i:"Banana"},{a:"100ml",i:"Full-fat milk"},{a:"15g",i:"Peanut butter, crunchy"},{a:"30g",i:"Whey protein isolate"},{a:"20g",i:"Low sugar raspberry coconut granola"}],steps:["Blend mixed berries, banana, milk, peanut butter and protein powder until smooth.","Pour into a bowl and top with granola.","Serve immediately."]},
{name:"Chocolate Banana Protein Mug Cake",meal:"snack",p:36,c:24,f:6,cal:291,ingredients:[{a:"100g",i:"Banana"},{a:"50g",i:"Egg, whole"},{a:"5g",i:"Sugar-free maple syrup"},{a:"30g",i:"Chocolate whey protein"},{a:"2g",i:"Vanilla extract"},{a:"2g",i:"Baking powder"},{a:"2g",i:"Baking soda"},{a:"10g",i:"Cocoa powder"}],steps:["Preheat oven to 180C.","Mash banana and whisk together with egg.","Add maple syrup and vanilla extract. Mix well.","Fold in protein powder, baking powder, baking soda and cocoa powder until combined.","Spray a ramekin or oven-safe mug with oil.","Pour batter into dish and bake 18-22 minutes until a toothpick comes out clean.","Cool 5-10 minutes before serving."]},
{name:"Smoked Salmon & Cottage Cheese Bagel Thins",meal:"snack",p:24,c:28,f:8,cal:277,ingredients:[{a:"50g",i:"Natural bagel thins"},{a:"70g",i:"Smoked salmon, cracked pepper"},{a:"25g",i:"Full-fat cottage cheese"},{a:"2g",i:"Baby capers"},{a:"2g",i:"Fresh dill"}],steps:["Toast the bagel halves until golden.","Spread cottage cheese evenly on both halves.","Layer smoked salmon on top.","Sprinkle with capers and fresh dill."]},
{name:"Peanut Butter Banana Bagel Thins",meal:"snack",p:12,c:44,f:11,cal:321,ingredients:[{a:"50g",i:"Natural bagel thins"},{a:"20g",i:"Peanut butter, smooth"},{a:"70g",i:"Banana, sliced"},{a:"1g",i:"Cinnamon, ground"}],steps:["Toast the bagel halves until golden.","Spread peanut butter evenly on both halves.","Layer sliced banana on top.","Sprinkle with ground cinnamon if desired."]},
{name:"Turkey & Cranberry Bagel Thins",meal:"snack",p:21,c:34,f:7,cal:283,ingredients:[{a:"50g",i:"Sesame bagel thins"},{a:"80g",i:"Shaved turkey"},{a:"25g",i:"Full-fat cream cheese"},{a:"20g",i:"Cranberry sauce"},{a:"20g",i:"English spinach"}],steps:["Toast the bagel until lightly crisp.","Spread cream cheese on both halves.","Add spinach then turkey slices on each half.","Spoon cranberry sauce on top."]},
{name:"Egg & Spinach Bagel Thins",meal:"snack",p:19,c:28,f:9,cal:273,ingredients:[{a:"50g",i:"Natural bagel thins"},{a:"50g",i:"English spinach"},{a:"2 medium",i:"Eggs"}],steps:["Cook the eggs in a pan to your liking.","Toast the bagel until golden.","Place spinach first, then egg on top of each half."]},
{name:"Tuna & Cucumber Bagel Thins",meal:"snack",p:25,c:34,f:8,cal:305,ingredients:[{a:"50g",i:"Natural bagel thins"},{a:"70g",i:"Chilli tuna"},{a:"50g",i:"Cucumber"},{a:"20g",i:"99% fat-free mayo"}],steps:["Toast the bagel halves.","Mix tuna with mayonnaise in a bowl.","Spread tuna mix on the bottom half.","Add sliced cucumber and top with the other half."]},
{name:"Ham & Cheese Bagel Thins",meal:"snack",p:32,c:30,f:9,cal:330,ingredients:[{a:"50g",i:"Natural bagel thins"},{a:"80g",i:"English-style leg ham"},{a:"34g",i:"Full-fat cheddar slice"}],steps:["Toast the bagel.","Layer ham and cheese on the bottom half.","Melt in a sandwich press or oven if desired."]},
{name:"Warm Milk, Honey & Salt",meal:"pre-sleep",p:8,c:22,f:8,cal:196,ingredients:[{a:"300ml",i:"Full-fat milk"},{a:"1 tbsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Warm milk gently on the stove over low heat.","Stir in honey and sea salt until dissolved.","Drink slowly before bed \u2014 this is non-negotiable in the system."],coach:"This is the sleep anchor of the Ignition Protocol. Milk provides tryptophan in a controlled dose alongside glycine and calcium \u2014 all sleep-supporting. Honey tops up liver glycogen to prevent the 2\u20133am cortisol spike that disrupts sleep architecture. Salt supports aldosterone and prevents overnight dehydration. Never skip this."},
{name:"Cottage Cheese & Honey Pre-Sleep",meal:"pre-sleep",p:24,c:20,f:6,cal:240,ingredients:[{a:"200g",i:"Full-fat cottage cheese"},{a:"1 tbsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Spoon cottage cheese into a bowl.","Drizzle honey over the top.","Add a pinch of sea salt.","Eat 45\u201360 minutes before bed."],coach:"Casein is the slow-release protein of choice for overnight muscle protein synthesis. The honey tops up liver glycogen. The salt supports overnight mineral balance. A complete pre-sleep recovery strategy."},
{name:"Greek Yoghurt & Honey",meal:"pre-sleep",p:18,c:26,f:8,cal:256,ingredients:[{a:"200g",i:"Full-fat Greek yoghurt"},{a:"2 tbsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Spoon yoghurt into a bowl.","Drizzle honey generously.","Add a pinch of sea salt.","Eat 45 minutes before sleep."],coach:"The acid-converted proteins in yoghurt (through fermentation) are more bioavailable than raw dairy. The probiotic culture supports gut lining integrity overnight \u2014 when gut repair peaks during fasting."},
{name:"Banana & Milk",meal:"pre-sleep",p:12,c:52,f:8,cal:336,ingredients:[{a:"2 medium",i:"Bananas"},{a:"300ml",i:"Full-fat milk"},{a:"pinch",i:"Sea salt"}],steps:["Peel bananas.","Pour a cold glass of full-fat milk.","Eat bananas alongside the milk.","Add a pinch of sea salt to the milk."],coach:"The tryptophan in banana + milk combination is well-documented for improving sleep onset. In this system, the timing and amount is deliberate \u2014 the carbohydrate load from the banana directs tryptophan into the brain while competing amino acids are occupied elsewhere."},
{name:"Parmigiano & Honey on Sourdough",meal:"pre-sleep",p:18,c:38,f:12,cal:336,ingredients:[{a:"2 slices",i:"Sourdough"},{a:"30g",i:"Parmigiano Reggiano"},{a:"1 tbsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Toast sourdough lightly.","Top with shavings of Parmigiano Reggiano.","Drizzle honey over the cheese.","Add a pinch of sea salt."],coach:"Tyrosine from Parmigiano paradoxically supports sleep when consumed alongside carbohydrates \u2014 it is converted to dopamine during the night phase, supporting deep sleep quality and morning drive."},
{name:"Ninja Creami - Banana Biscoff Protein Ice Cream",meal:"pre-sleep",p:28,c:39,f:10,cal:362,ingredients:[{a:"200ml",i:"Full-fat milk"},{a:"110g",i:"Banana"},{a:"30g",i:"Protein powder, salted caramel"},{a:"15g",i:"Biscoff spread, crunchy"},{a:"8g",i:"Biscoff biscuit, crushed"}],steps:["Pour milk into a Ninja Creami pint container.","Add protein powder, banana and Biscoff spread.","Freeze for 12+ hours.","Spin on Ice Cream mode (or Lite Ice Cream).","If needed, add a splash of milk and respin for a smoother texture.","Top with crushed Biscoff."],coach:"Batch: 1 pint -- serves 2. Divide macros by 2 per serve."},
{name:"Ninja Creami - Vanilla Protein Ice Cream",meal:"pre-sleep",p:33,c:16,f:3,cal:225,ingredients:[{a:"30g",i:"Whey protein isolate, vanilla"},{a:"250ml",i:"Full-fat milk"},{a:"50g",i:"Full-fat Greek yoghurt"},{a:"15g",i:"Raw honey"},{a:"5g",i:"Vanilla extract"}],steps:["Blend all ingredients until smooth.","Pour into Ninja Creami pint and freeze at least 12 hours.","Spin on Lite Ice Cream mode.","If needed, respin or add a splash of milk for creamier texture."],coach:"Batch: 1 pint -- serves 2. Divide macros by 2 per serve."},
{name:"Ninja Creami - Chocolate Peanut Butter Protein Ice Cream",meal:"pre-sleep",p:34,c:14,f:15,cal:329,ingredients:[{a:"30g",i:"Chocolate whey protein isolate"},{a:"250ml",i:"Full-fat milk"},{a:"20g",i:"Peanut butter, smooth"},{a:"10g",i:"Cocoa powder"},{a:"10g",i:"Raw honey"}],steps:["Blend all ingredients until smooth.","Pour into Ninja Creami pint and freeze at least 12 hours.","Spin on Lite Ice Cream mode.","Add a splash of milk and respin for a smoother texture if needed."],coach:"Batch: 1 pint -- serves 2. Divide macros by 2 per serve."},
{name:"Ninja Creami - Strawberry Cheesecake Ice Cream",meal:"pre-sleep",p:23,c:18,f:14,cal:290,ingredients:[{a:"80g",i:"Strawberries, fresh"},{a:"50g",i:"Full-fat cream cheese block"},{a:"250ml",i:"Full-fat milk"},{a:"20g",i:"Whey protein isolate, vanilla"},{a:"15g",i:"Raw honey"}],steps:["Blend all ingredients until smooth.","Pour into Ninja Creami pint and freeze at least 12 hours.","Spin on Lite Ice Cream mode.","Add a splash of milk and respin if needed."],coach:"Batch: 1 pint -- serves 2. Divide macros by 2 per serve."},
{name:"Ninja Creami - Caramel Coffee Protein Ice Cream",meal:"pre-sleep",p:32,c:11,f:2,cal:194,ingredients:[{a:"30g",i:"Whey protein isolate, salted caramel"},{a:"100ml",i:"Long black coffee"},{a:"150ml",i:"Full-fat milk"},{a:"50g",i:"Full-fat Greek yoghurt"},{a:"10g",i:"Raw honey"}],steps:["Blend all ingredients until smooth.","Pour into Ninja Creami pint and freeze at least 12 hours.","Spin on Lite Ice Cream mode.","Add a splash of milk and respin if needed."],coach:"Batch: 1 pint -- serves 2. Divide macros by 2 per serve."},
{name:"Ninja Creami - Cookies & Cream Protein Ice Cream",meal:"pre-sleep",p:33,c:30,f:7,cal:319,ingredients:[{a:"30g",i:"Cookies & cream whey protein isolate"},{a:"250ml",i:"Full-fat milk"},{a:"50g",i:"Full-fat Greek yoghurt"},{a:"15g",i:"Raw honey"},{a:"20g",i:"Oreo cookies, crushed"}],steps:["Blend protein powder, milk, Greek yoghurt and honey until smooth.","Pour into Ninja Creami pint and freeze at least 12 hours.","Spin on Lite Ice Cream mode.","Add crushed Oreo cookies and use Mix-In mode.","Add a splash of milk and respin for a creamier texture if needed."],coach:"Batch: 1 pint -- serves 2. Divide macros by 2 per serve."},
{name:"Anzac Ninja Creami",meal:"pre-sleep",p:36,c:35,f:12,cal:394,ingredients:[{a:"150ml",i:"Full-fat milk"},{a:"30g",i:"Whey protein isolate"},{a:"80g",i:"Full-fat Greek yoghurt"},{a:"10g",i:"Raw honey"},{a:"5g",i:"Desiccated coconut"},{a:"10g",i:"Rolled oats"},{a:"1",i:"ANZAC biscuit, crushed"}],steps:["Blend milk, yoghurt, protein, honey, oats and coconut until smooth.","Pour mixture into a Ninja Creami pint and freeze for 24 hours.","Spin using Lite Ice Cream mode.","If needed, respin with a splash of milk for creamier texture.","Serve topped with crushed ANZAC biscuit."],coach:"Batch: 1 pint -- serves 2. Divide macros by 2 per serve."},

const CLIENT_RECIPES = [];

const ALL_RECIPES = [...RECIPES, ...CLIENT_RECIPES];

// ═══════════════════════════════════════
// APP STATE & RENDER
// ═══════════════════════════════════════
let currentMeal = 'all';

function setMeal(meal, btn) {
  currentMeal = meal;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  const bar = document.getElementById('resultsBar');

  let filtered = ALL_RECIPES.filter(r => {
    const mealMatch = currentMeal === 'all' || r.meal === currentMeal;
    if (!mealMatch) return false;
    if (!query) return true;
    const searchStr = [
      r.name,
      r.meal,
      ...(r.ingredients || []).map(i => i.i),
      r.coach || ''
    ].join(' ').toLowerCase();
    return query.split(' ').every(word => searchStr.includes(word));
  });

  document.getElementById('totalCount').innerHTML = ALL_RECIPES.length + '<small>PRO-METABOLIC RECIPES</small>';
  bar.textContent = filtered.length + ' recipe' + (filtered.length !== 1 ? 's' : '') + (query ? ' matching "' + query + '"' : '');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map((r, i) => {
    const tagClass = 'tag-' + r.meal;
    const tagLabel = r.meal === 'lunch-dinner' ? 'LUNCH / DINNER' : r.meal.replace(/-/g, ' ').toUpperCase();
    return `<div class="card" onclick="openModal(${ALL_RECIPES.indexOf(r)})">
      <span class="card-tag ${tagClass}">${tagLabel}</span>
      <div class="card-name">${r.name}</div>
      <div class="card-macros">
        <div class="macro-item">
          <span class="macro-val">${r.p}g</span>
          <span class="macro-label">Protein</span>
        </div>
        <div class="macro-divider"></div>
        <div class="macro-item">
          <span class="macro-val">${r.c}g</span>
          <span class="macro-label">Carbs</span>
        </div>
        <div class="macro-divider"></div>
        <div class="macro-item">
          <span class="macro-val">${r.f}g</span>
          <span class="macro-label">Fat</span>
        </div>
        <div class="macro-divider"></div>
        <div class="macro-item card-cal">
          <span class="macro-val">${r.cal}</span>
          <span class="macro-label">kcal</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openModal(idx) {
  const r = ALL_RECIPES[idx];
  const tagClass = 'tag-' + r.meal;
  const tagLabel = r.meal === 'lunch-dinner' ? 'LUNCH / DINNER' : r.meal.replace(/-/g, ' ').toUpperCase();

  document.getElementById('mTag').innerHTML = `<span class="card-tag ${tagClass}">${tagLabel}</span>`;
  document.getElementById('mTitle').textContent = r.name;

  document.getElementById('mMacros').innerHTML = `
    <div class="modal-macro"><span class="val">${r.p}g</span><span class="lbl">Protein</span></div>
    <div class="modal-macro"><span class="val">${r.c}g</span><span class="lbl">Carbs</span></div>
    <div class="modal-macro"><span class="val">${r.f}g</span><span class="lbl">Fat</span></div>
    <div class="modal-macro"><span class="val yellow">${r.cal}</span><span class="lbl">kcal</span></div>
  `;

  let bodyHTML = '';

  if (r.ingredients && r.ingredients.length) {
    bodyHTML += `<div>
      <div class="modal-section-title">Ingredients</div>
      <table class="ingredients-table">
        ${r.ingredients.map(ing => `<tr><td>${ing.a}</td><td>${ing.i}</td></tr>`).join('')}
      </table>
    </div>`;
  }

  if (r.steps && r.steps.length) {
    bodyHTML += `<div>
      <div class="modal-section-title">Method</div>
      <ol class="steps-list">
        ${r.steps.map((s, i) => `<li><span class="step-num">${i+1}</span><span>${s}</span></li>`).join('')}
      </ol>
    </div>`;
  }

  if (r.coach) {
    bodyHTML += `<div class="coach-note"><strong>Coach's Note</strong>${r.coach}</div>`;
  }

  document.getElementById('mBody').innerHTML = bodyHTML;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
});

render();



</script>
