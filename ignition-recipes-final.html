{name:"Protein Pancakes",meal:"breakfast",p:21,c:53,f:4,cal:325,ingredients:[{a:"80g",i:"Protein pancake mix"},{a:"20g",i:"Whey protein blend"},{a:"75g",i:"Banana, sliced"},{a:"5g",i:"Canadian maple syrup"},{a:"2g",i:"Butter"},{a:"1g",i:"Cinnamon"},{a:"100ml",i:"Water"}],steps:["In a bowl, mix protein pancake mix, whey protein, cinnamon and water until smooth.","Heat butter in a non-stick pan over medium heat.","Pour batter to form pancakes. Cook until bubbles appear, then flip.","Serve pancakes topped with sliced banana and a drizzle of syrup."]},
{name:"Banana Bread",meal:"breakfast",p:26,c:53,f:13,cal:440,ingredients:[{a:"85g",i:"Banana, mashed"},{a:"1 medium",i:"Egg"},{a:"60g",i:"Full-fat salted caramel yoghurt"},{a:"15g",i:"Sugar-free maple syrup"},{a:"15g",i:"Whey protein"},{a:"30g",i:"Wholemeal flour"},{a:"1g",i:"Baking powder"},{a:"1g",i:"Baking soda"},{a:"25g",i:"Milk choc bits"}],steps:["Preheat oven to 180C and line a small loaf tin.","Mash banana and mix with egg, yoghurt, maple syrup and whey until smooth.","Stir in flour, baking powder and baking soda until just combined.","Fold in chocolate bits.","Pour into the loaf tin and smooth the top.","Bake 25-30 minutes until a toothpick comes out clean.","Cool before slicing."]},
{name:"Choc Chip Banana Bread",meal:"breakfast",p:43,c:238,f:108,cal:2100,ingredients:[{a:"300g",i:"Banana, mashed"},{a:"250g",i:"Wholemeal flour"},{a:"1g",i:"Salt"},{a:"2g",i:"Baking powder"},{a:"115g",i:"Butter"},{a:"80g",i:"Full-fat banana yoghurt"},{a:"3g",i:"Vanilla bean paste"},{a:"30g",i:"Milk choc bits"},{a:"120g",i:"Brown sugar alternative"}],steps:["Preheat oven to 180C and line a loaf pan with parchment paper.","Mash bananas in a large bowl.","Add flour, salt, baking powder and brown sugar alternative. Mix until combined.","Melt butter and stir in with yoghurt and vanilla bean paste.","Fold in chocolate bits.","Pour batter into the loaf pan and spread evenly.","Bake 50-60 minutes until a skewer inserted in the centre comes out clean.","Cool before slicing."],coach:"Batch recipe -- serves 8. Divide all macros by 8 for per-serve totals."},
{name:"Bagel - Bacon & Hash Brown",meal:"breakfast",p:29,c:67,f:26,cal:618,ingredients:[{a:"90g",i:"Natural bagel"},{a:"1 medium",i:"Egg"},{a:"50g",i:"Bacon, shortcut"},{a:"16g",i:"Full-fat cheddar burger slice"},{a:"75g",i:"Hash brown"},{a:"15g",i:"Tomato chutney"},{a:"10g",i:"Chipotle mayonnaise"}],steps:["Toast the bagel halves lightly.","Cook hash brown and bacon in a non-stick pan until crispy.","Fry the egg to preferred doneness.","Spread tomato chutney on one half of the bagel and chipotle mayo on the other.","Assemble the bagel with bacon, egg, cheese and hash brown."]},
{name:"Bagel - Avo, Cheese & Egg",meal:"breakfast",p:31,c:49,f:21,cal:508,ingredients:[{a:"90g",i:"Natural bagel"},{a:"50g",i:"Full-fat cottage cheese"},{a:"50g",i:"Avocado"},{a:"5g",i:"Everything bagel seasoning"},{a:"2 medium",i:"Eggs"}],steps:["Toast the bagel halves lightly.","Spread cottage cheese on one half and mashed avocado on the other.","Cook eggs to your preference.","Sprinkle bagel seasoning over the avocado.","Assemble the bagel with eggs in between."]},
{name:"Eggs & Avo Bagel",meal:"breakfast",p:16,c:56,f:16,cal:435,ingredients:[{a:"1 medium",i:"Egg"},{a:"90g",i:"Plain bagel"},{a:"50g",i:"Avocado"},{a:"5g",i:"Butter"}],steps:["Slice the bagel in half and toast to desired crispness.","Cook egg your favourite way.","Mash avocado and spread evenly on the toasted bagel halves.","Top each half with egg. Serve immediately."]},
{name:"Smoked Salmon Bagel",meal:"breakfast",p:25,c:34,f:11,cal:331,ingredients:[{a:"90g",i:"Low-carb bagel"},{a:"50g",i:"Smoked salmon"},{a:"30g",i:"Full-fat cottage cheese"},{a:"5g",i:"Baby capers"},{a:"3g",i:"Butter"},{a:"2g",i:"Fresh dill"}],steps:["Slice the bagel in half and toast to desired crispness.","Spread butter evenly on both halves.","Layer cottage cheese on each half.","Add slices of smoked salmon on top.","Sprinkle baby capers over the salmon. Garnish with fresh dill."]},
{name:"Turkey & Cottage Cheese Bagel",meal:"breakfast",p:26,c:37,f:8,cal:324,ingredients:[{a:"90g",i:"Low-carb bagel"},{a:"60g",i:"Full-fat cottage cheese"},{a:"60g",i:"Turkey breast slices"},{a:"20g",i:"Mixed leafy greens"},{a:"5g",i:"Butter"}],steps:["Slice the bagel in half and toast to desired crispness.","Spread butter evenly on both halves.","Layer cottage cheese on each bagel half.","Add mixed leafy greens then turkey slices.","Assemble and enjoy."]},
{name:"Bagel - Avocado, Egg, Turkey",meal:"breakfast",p:31,c:33,f:23,cal:462,ingredients:[{a:"90g",i:"Low-carb bagel"},{a:"90g",i:"Avocado"},{a:"2 medium",i:"Eggs"},{a:"50g",i:"Shaved turkey"},{a:"1g",i:"Olive oil spray"}],steps:["Slice the bagel in half and lightly toast.","Spray a pan with olive oil and cook eggs to preferred doneness.","Mash the avocado and spread evenly on one half of the bagel.","Layer shaved turkey and cooked eggs on top of the avocado. Assemble and serve."]},
{name:"Bacon & Eggs on Toast",meal:"breakfast",p:35,c:69,f:26,cal:655,ingredients:[{a:"166g",i:"Traditional wholemeal bread"},{a:"60g",i:"Bacon, shortcut"},{a:"2 medium",i:"Eggs"},{a:"10g",i:"Butter"}],steps:["Toast bread and spread with butter.","Cook bacon in a non-stick pan until crispy.","Fry eggs to preferred doneness.","Assemble by placing bacon and eggs on the toasted bread."]},
{name:"Pumpkin Brownies",meal:"breakfast",p:19,c:53,f:20,cal:467,ingredients:[{a:"250g",i:"Pumpkin, peeled"},{a:"40g",i:"Cocoa powder"},{a:"1 medium",i:"Egg"},{a:"65g",i:"Stevia"},{a:"40g",i:"Milk choc chips"},{a:"2g",i:"Baking powder"},{a:"5g",i:"Vanilla bean paste"}],steps:["Preheat oven to 180C and line a baking tray.","Steam or boil pumpkin until soft. Mash until smooth.","Mix mashed pumpkin, cocoa powder, egg, stevia, vanilla paste and baking powder until combined.","Fold in chocolate chips.","Pour into the prepared baking tray and spread evenly.","Bake 25-30 minutes until set.","Cool before slicing."],coach:"Batch recipe. Divide total macros by number of serves."},
{name:"Ham & Cheese Melt Croissant",meal:"breakfast",p:20,c:20,f:14,cal:292,ingredients:[{a:"42g",i:"Plain croissant"},{a:"15g",i:"Full-fat ricotta"},{a:"17g",i:"Full-fat cheddar slice"},{a:"15g",i:"Dijon mustard"},{a:"50g",i:"Leg ham, thinly sliced"}],steps:["Slice the croissant in half lengthwise.","Spread mustard and ricotta evenly on the inside.","Layer ham and cheese on the bottom half.","Close the croissant and toast in a sandwich press or air fryer until golden and the cheese melts."]},
{name:"Crumpet with Smoked Salmon and Cream Cheese",meal:"breakfast",p:14,c:20,f:8,cal:206,ingredients:[{a:"50g",i:"Round crumpet"},{a:"40g",i:"Smoked salmon"},{a:"15g",i:"Full-fat cream cheese"},{a:"2g",i:"Fresh dill"},{a:"2g",i:"Baby capers"}],steps:["Toast crumpets 2 minutes or as desired.","Spread cream cheese over the crumpet.","Lay smoked salmon on top.","Garnish with capers, dill or preferred toppings."]},
{name:"Peanut Butter & Berry Protein Oats",meal:"breakfast",p:42,c:39,f:17,cal:475,ingredients:[{a:"50g",i:"Rolled oats"},{a:"30g",i:"Whey protein isolate"},{a:"15g",i:"Peanut butter"},{a:"150ml",i:"Full-fat milk"},{a:"100g",i:"Frozen mixed berries"}],steps:["Cook oats with milk until creamy.","Stir in protein powder until fully combined.","Top with peanut butter and frozen mixed berries.","Serve warm."]},
{name:"Pre-Workout Energy Oats",meal:"pre-workout",p:28,c:62,f:8,cal:436,ingredients:[{a:"80g",i:"Rolled oats"},{a:"200ml",i:"Full-fat milk"},{a:"1 tbsp",i:"Raw honey"},{a:"1 tbsp",i:"Coconut oil"},{a:"1 tsp",i:"Sea salt"}],steps:["Combine oats and milk in a saucepan over medium heat.","Stir continuously until oats absorb the milk and reach a creamy consistency.","Remove from heat, stir in honey, coconut oil and a pinch of sea salt.","Serve immediately \u2014 eat 60\u201390 minutes before training."],coach:"Fast-digesting carbs from oats and honey prime glycogen stores. The honey provides fructose to top up liver glycogen \u2014 critical for maintaining training output. Keep fat minimal in this window."},
{name:"Pre-Workout Fruit & Yoghurt Bowl",meal:"pre-workout",p:22,c:55,f:5,cal:352,ingredients:[{a:"200g",i:"Full-fat Greek yoghurt"},{a:"1 medium",i:"Banana, sliced"},{a:"100g",i:"Mango, diced"},{a:"1 tbsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Spoon yoghurt into a bowl.","Top with sliced banana and mango.","Drizzle honey over the top.","Add a pinch of sea salt and serve."],coach:"Simple sugars from banana and mango absorb quickly \u2014 ideal 60 minutes before training. Greek yoghurt provides a fast protein hit without the fat load that would slow digestion."},
{name:"Pre-Workout Rice Cake Stack",meal:"pre-workout",p:18,c:48,f:3,cal:296,ingredients:[{a:"4",i:"Rice cakes"},{a:"1 tbsp",i:"Raw honey"},{a:"100g",i:"Cottage cheese"},{a:"pinch",i:"Sea salt"}],steps:["Lay rice cakes flat on a plate.","Spread cottage cheese evenly across each.","Drizzle honey over the top.","Add a pinch of sea salt before serving."],coach:"Low-fat, fast-carb option. Rice cakes spike insulin mildly which helps drive amino acids into muscle pre-training. Cottage cheese provides casein \u2014 slower digesting but adequate for a 60-min pre-workout window."},
{name:"Pre-Workout Banana & Milk",meal:"pre-workout",p:12,c:42,f:5,cal:265,ingredients:[{a:"2 medium",i:"Bananas"},{a:"250ml",i:"Full-fat milk"},{a:"1 tsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Peel and slice bananas into a glass or bowl.","Pour cold full-fat milk alongside.","Drizzle honey over the bananas.","Add a pinch of sea salt. Eat bananas and drink milk together."],coach:"The simplest pre-workout meal in the system. Bananas are high in B6 which supports serotonin \u2014 keep this meal timed at 45\u201360 min pre-training so serotonin doesn't peak mid-session."},
{name:"Pre-Workout Toast & Honey",meal:"pre-workout",p:14,c:52,f:6,cal:322,ingredients:[{a:"2 slices",i:"Sourdough bread"},{a:"1 tbsp",i:"Butter"},{a:"2 tbsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Toast sourdough until golden.","Spread butter generously across each slice while hot.","Drizzle raw honey over both slices.","Add a pinch of sea salt and serve immediately."],coach:"Sourdough is lower in antinutrients than standard bread due to fermentation. Butter adds a small fat buffer to slow glucose release slightly \u2014 ideal for a 90-minute pre-workout window."},
{name:"Orange Juice & Honey Pre-Workout",meal:"pre-workout",p:2,c:38,f:0,cal:163,ingredients:[{a:"250ml",i:"Fresh orange juice"},{a:"15g",i:"Raw honey"},{a:"1g",i:"Sea salt, pinch"}],steps:["Squeeze oranges into a glass or use fresh-pressed juice.","Stir in raw honey and a pinch of sea salt until dissolved.","Drink 30-45 minutes before training."],coach:"Fast glucose from OJ + fructose from honey primes liver glycogen. The pinch of salt supports electrolyte balance during training. No fat, no fibre -- nothing to slow digestion."},
{name:"Milk & Honey Pre-Workout",meal:"pre-workout",p:8,c:35,f:8,cal:246,ingredients:[{a:"300ml",i:"Full-fat milk"},{a:"20g",i:"Raw honey"},{a:"1g",i:"Sea salt, pinch"}],steps:["Warm milk gently -- do not boil.","Stir in honey and a pinch of sea salt until fully dissolved.","Drink 45-60 minutes before training."],coach:"Full-fat milk provides a slow glucose release via lactose, plus calcium and casein. The honey adds fast-acting fructose for immediate glycogen. Best when training is 60+ minutes out."},
{name:"Mango & Coconut Water Pre-Workout",meal:"pre-workout",p:3,c:42,f:1,cal:186,ingredients:[{a:"200g",i:"Frozen mango chunks"},{a:"200ml",i:"Coconut water"},{a:"10g",i:"Raw honey"},{a:"1g",i:"Sea salt, pinch"}],steps:["Blend mango, coconut water, honey and salt until smooth.","Drink 30-45 minutes before training."],coach:"Mango is one of the highest-B1 (thiamine) fruits available -- rate-limiting for glucose metabolism. Coconut water provides potassium and natural electrolytes. Honey adds fructose for liver glycogen. Clean, digestion-friendly pre-training fuel."},
{name:"Apple Juice & Salt Pre-Workout",meal:"pre-workout",p:1,c:34,f:0,cal:138,ingredients:[{a:"250ml",i:"Apple juice, fresh-pressed"},{a:"5g",i:"Raw honey"},{a:"1g",i:"Sea salt, pinch"}],steps:["Combine apple juice, honey and sea salt in a glass. Stir well.","Drink 20-30 minutes before training."],coach:"Apple juice provides fructose and glucose in a near 1:1 ratio -- ideal for both liver and muscle glycogen loading simultaneously. The fastest option in the pre-workout lineup. Best when training starts soon."},
{name:"Banana & Warm Water Pre-Workout",meal:"pre-workout",p:2,c:30,f:0,cal:128,ingredients:[{a:"120g",i:"Ripe banana"},{a:"200ml",i:"Warm water"},{a:"5g",i:"Raw honey"},{a:"1g",i:"Sea salt, pinch"}],steps:["Blend banana, warm water, honey and salt until completely smooth and liquid.","Drink 30-45 minutes before training."],coach:"Blending banana with warm water creates a liquid meal that digests faster than eating the banana whole. The warm water temperature accelerates gastric emptying. Honey tops up liver glycogen. Ideal when you want food-source carbs without the bulk."},
{name:"Post-Workout White Rice & Beef",meal:"post-workout",p:48,c:72,f:6,cal:542,ingredients:[{a:"300g",i:"Extra lean beef mince, cooked"},{a:"250g",i:"White rice, cooked"},{a:"1 tbsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Cook beef mince in a non-stick pan until browned. Season with salt.","Plate cooked white rice alongside the mince.","Drizzle honey over the rice.","Eat immediately \u2014 this is your post-training refeed window."],coach:"White rice is ideal post-training \u2014 no fibre to slow absorption, rapid glucose spike to drive insulin and shut down cortisol. Lean beef delivers branch-chain amino acids without excess fat to slow gastric emptying."},
{name:"Post-Workout Milk & Honey",meal:"post-workout",p:16,c:38,f:8,cal:292,ingredients:[{a:"400ml",i:"Full-fat milk"},{a:"2 tbsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Warm the milk gently on the stove \u2014 do not boil.","Stir in honey and a pinch of sea salt until dissolved.","Drink immediately after training."],coach:"The fastest liquid post-workout option in the system. Milk lactose (glucose + galactose) replenishes liver glycogen specifically. Salt replaces what was lost in sweat. Zero-prep, zero excuses."},
{name:"Post-Workout Banana Honey Shake",meal:"post-workout",p:24,c:58,f:4,cal:366,ingredients:[{a:"2 medium",i:"Bananas"},{a:"200ml",i:"Full-fat milk"},{a:"1 tbsp",i:"Raw honey"},{a:"1 scoop",i:"Whey protein isolate"},{a:"pinch",i:"Sea salt"}],steps:["Add all ingredients to a blender.","Blend for 30 seconds until smooth.","Drink immediately post-training."],coach:"WPI is justified here \u2014 post-workout is the one window where fast protein absorption genuinely matters. The low tryptophan:BCAA ratio of WPI means you get the amino acid spike without the serotonin load of whole food protein."},
{name:"Post-Workout Orange Juice & Protein",meal:"post-workout",p:26,c:44,f:2,cal:306,ingredients:[{a:"300ml",i:"Fresh orange juice"},{a:"1 scoop",i:"Whey protein isolate"},{a:"pinch",i:"Sea salt"}],steps:["Pour fresh orange juice into a glass.","Stir in protein powder until dissolved.","Add a pinch of sea salt and drink immediately."],coach:"OJ provides fast-acting fructose to rapidly replenish liver glycogen \u2014 one of the most efficient liver refuelling strategies in the system. Combine with WPI for a complete post-training hit."},
{name:"Post-Workout Cottage Cheese & Fruit",meal:"post-workout",p:30,c:46,f:6,cal:360,ingredients:[{a:"250g",i:"Full-fat cottage cheese"},{a:"1 medium",i:"Banana"},{a:"100g",i:"Mango, diced"},{a:"1 tbsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Spoon cottage cheese into a bowl.","Top with sliced banana and diced mango.","Drizzle honey over the top.","Add a pinch of sea salt and eat immediately."],coach:"Cottage cheese is high in casein but also contains fast whey fractions \u2014 a solid whole-food post-workout option when you're not using WPI. The fruit load spikes insulin and drives nutrient uptake."},
{name:"Post-Workout Rice Cakes, Peanut Butter & Protein Shake",meal:"post-workout",p:31,c:26,f:12,cal:339,ingredients:[{a:"25g",i:"Thin rice cakes"},{a:"20g",i:"Peanut butter, smooth"},{a:"31g",i:"Whey protein, vanilla"}],steps:["Spread peanut butter evenly over rice cakes.","Mix protein powder with cold water or full-fat milk in a shaker.","Eat rice cakes and drink protein shake together post-training."],coach:"Keep fat minimal in the immediate post-workout window. This combination covers fast carbs for glycogen and WPI for rapid amino acid delivery."},
{name:"Mixed Berry Smoothie",meal:"post-workout",p:25,c:51,f:8,cal:374,ingredients:[{a:"20g",i:"Whey protein isolate"},{a:"150ml",i:"Full-fat milk"},{a:"50g",i:"Rolled oats"},{a:"20g",i:"Raw honey"},{a:"100g",i:"Frozen mixed berries"}],steps:["Add all ingredients to a blender.","Blend until smooth.","Pour into a glass and serve immediately."]},
{name:"Biscoff Smoothie",meal:"post-workout",p:27,c:26,f:13,cal:325,ingredients:[{a:"20g",i:"Biscoff spread, smooth"},{a:"250ml",i:"Full-fat milk"},{a:"5g",i:"Chia seeds"},{a:"30g",i:"Whey protein isolate, salted caramel"},{a:"50g",i:"Banana"}],steps:["Blend all ingredients until smooth.","Pour into a glass or bowl.","Serve immediately or chill for a thicker texture."]},
{name:"Banana Protein Smoothie",meal:"post-workout",p:26,c:54,f:10,cal:412,ingredients:[{a:"30g",i:"Protein powder"},{a:"300ml",i:"Full-fat milk"},{a:"150g",i:"Banana"},{a:"40g",i:"Rolled oats"}],steps:["Add all ingredients to a blender.","Blend until smooth and creamy.","Pour into a glass and serve immediately."]},
{name:"Peanut Butter Protein Smoothie",meal:"post-workout",p:34,c:25,f:13,cal:349,ingredients:[{a:"30g",i:"Whey protein isolate, vanilla"},{a:"100g",i:"Banana"},{a:"20g",i:"Peanut butter, smooth"},{a:"200ml",i:"Full-fat milk"}],steps:["Add protein powder, banana, peanut butter and milk to a blender.","Blend until smooth and creamy.","Pour into a glass and serve."]},
{name:"Beef & Rice Bowl",meal:"lunch",p:44,c:66,f:8,cal:524,ingredients:[{a:"200g",i:"Extra lean beef mince, cooked"},{a:"250g",i:"White rice, cooked"},{a:"pinch",i:"Sea salt"},{a:"1 tsp",i:"Raw honey"}],steps:["Cook beef mince in a non-stick pan until browned. Season with salt.","Plate cooked white rice and top with beef mince.","Drizzle honey over the top.","Serve immediately."],coach:"The simplest high-protein lunch in the system. White rice is preferred over brown in this system \u2014 lower in antinutrients, easier to digest, and faster-absorbing for glycogen replenishment."},
{name:"Prawn & Rice Bowl",meal:"lunch",p:38,c:62,f:6,cal:464,ingredients:[{a:"200g",i:"Prawns, cooked"},{a:"250g",i:"Jasmine rice, cooked"},{a:"1 tbsp",i:"Butter"},{a:"1 tbsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Cook prawns in a pan with butter over medium heat until pink.","Drizzle honey over the prawns in the last 30 seconds.","Plate jasmine rice and top with honey butter prawns.","Season with sea salt and serve."],coach:"Prawns are one of the highest-protein, lowest-fat seafood options. The butter and honey glaze adds palatability while keeping fat sources clean."},
{name:"Chicken Thigh & Rice",meal:"lunch",p:46,c:62,f:12,cal:540,ingredients:[{a:"250g",i:"Chicken thigh, skin-on, raw"},{a:"250g",i:"White rice, cooked"},{a:"15g",i:"Butter"},{a:"1 tsp",i:"Sea salt"}],steps:["Season chicken thigh with sea salt.","Cook skin-side down in a pan over medium heat until skin is crispy, 6\u20137 minutes.","Flip and cook another 4\u20135 minutes until cooked through.","Plate over white rice with a knob of butter."],coach:"Chicken thigh skin-on is acceptable 2\u20133x per week in the system. The skin provides fat and fat-soluble vitamins. Breast is avoided due to its high tryptophan:BCAA ratio which can blunt dopamine."},
{name:"Lamb & Potato Bowl",meal:"lunch",p:42,c:48,f:16,cal:512,ingredients:[{a:"200g",i:"Lamb fillet, lean"},{a:"250g",i:"Potato, boiled"},{a:"20g",i:"Butter"},{a:"pinch",i:"Sea salt"}],steps:["Season lamb with sea salt.","Cook in a hot pan to desired doneness. Rest 5 minutes.","Boil potato until tender. Toss with butter and salt.","Slice lamb and plate with potatoes."],coach:"Lamb is one of the richest sources of zinc and B12 in the system. Its conjugated linoleic acid (CLA) content supports body composition. Potato is the preferred starch \u2014 higher in potassium than rice."},
{name:"Beef Liver & Onion",meal:"lunch",p:28,c:18,f:12,cal:296,ingredients:[{a:"150g",i:"Beef liver"},{a:"100g",i:"Brown onion, sliced"},{a:"15g",i:"Butter"},{a:"pinch",i:"Sea salt"}],steps:["Slice liver thinly. Season with salt.","Melt butter in a pan over medium heat. Cook onion until soft and golden.","Increase heat slightly and add liver. Cook 2\u20133 minutes per side \u2014 do not overcook.","Plate liver over onion."],coach:"Liver is the most nutrient-dense food in the system \u2014 bar none. It is the highest source of retinol (true Vitamin A), B12, folate, copper, and CoQ10. Eat liver at minimum once per week."},
{name:"Salmon & Potato",meal:"lunch",p:38,c:44,f:18,cal:490,ingredients:[{a:"200g",i:"Salmon fillet"},{a:"250g",i:"Potato, boiled"},{a:"20g",i:"Butter"},{a:"1 tsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Season salmon with salt.","Cook in a pan with butter over medium heat, 3\u20134 minutes per side.","Boil potatoes until tender, toss with butter and salt.","Plate salmon alongside potatoes. Drizzle honey over salmon."],coach:"Salmon 2\u20133x per week maximum due to PUFA load. Potato provides the starch buffer to balance the PUFA \u2014 carbohydrates help mitigate lipid peroxidation."},
{name:"Kangaroo & Sweet Potato Bowl",meal:"lunch",p:44,c:52,f:6,cal:444,ingredients:[{a:"200g",i:"Kangaroo mince or steak"},{a:"200g",i:"Sweet potato, cubed"},{a:"15g",i:"Butter"},{a:"pinch",i:"Sea salt"}],steps:["Preheat oven to 200\u00b0C. Toss sweet potato with butter and salt on a tray. Roast 20\u201325 minutes.","Cook kangaroo in a pan over medium-high heat. Season with salt.","Plate sweet potato and top with cooked kangaroo."],coach:"Kangaroo is the lowest-fat red meat in the system and one of the highest in haem iron. Its wild-harvested nature means it's free of the omega-6 load found in grain-fed beef. Excellent for body recomposition phases."},
{name:"Pork & Apple",meal:"lunch",p:38,c:36,f:14,cal:432,ingredients:[{a:"200g",i:"Pork tenderloin"},{a:"1 medium",i:"Apple, sliced"},{a:"1 tbsp",i:"Raw honey"},{a:"15g",i:"Butter"},{a:"pinch",i:"Sea salt"}],steps:["Season pork with salt. Cook in a pan with butter over medium heat 4\u20135 minutes per side.","In the same pan, add apple slices and drizzle with honey. Cook 2\u20133 minutes until caramelised.","Rest pork 5 minutes then slice.","Plate pork with caramelised apple alongside."],coach:"Pork tenderloin is one of the leanest red meat options. Apple provides pectin \u2014 a prebiotic fibre that feeds beneficial gut bacteria and helps lower endotoxin load. The honey-apple combination is a classic system pairing."},
{name:"Beef & Sweet Potato Bowl",meal:"lunch",p:42,c:52,f:8,cal:460,ingredients:[{a:"200g",i:"Extra lean beef mince"},{a:"200g",i:"Sweet potato, boiled"},{a:"15g",i:"Butter"},{a:"1 tsp",i:"Raw honey"},{a:"pinch",i:"Sea salt"}],steps:["Cook beef mince in a non-stick pan until browned. Season with salt.","Boil sweet potato until tender. Mash with butter and salt.","Plate mashed sweet potato and top with beef mince.","Drizzle honey over the top."],coach:"Sweet potato is high in beta-carotene which converts to Vitamin A \u2014 however in this system, retinol from liver is preferred. Sweet potato's starch profile is well-suited to post-workout lunch timing."},
{name:"Chicken Wrap",meal:"lunch",p:37,c:36,f:20,cal:476,ingredients:[{a:"71g",i:"Lite wrap"},{a:"80g",i:"Chicken thigh, skin-on, cooked"},{a:"21g",i:"Full-fat cheddar slice"},{a:"1 handful",i:"Mixed leafy greens"},{a:"40g",i:"Avocado"},{a:"10g",i:"Kewpie mayonnaise"}],steps:["Warm the wrap in a pan or microwave for roughly 30 seconds.","Spread mayonnaise over the wrap. Layer greens, chicken, cheese and avocado.","Roll tightly, toast if preferred, then serve."]},
{name:"Chicken, Rice & Veg",meal:"lunch",p:38,c:58,f:18,cal:548,ingredients:[{a:"100g",i:"Chicken thigh, skin-on, cooked"},{a:"150g",i:"Mixed vegetables, frozen"},{a:"10g",i:"Gravy powder"},{a:"125g",i:"White rice, cooked"},{a:"80g",i:"Avocado"}],steps:["Heat mixed vegetables in a microwave or pan.","Prepare gravy according to package instructions.","Plate cooked rice, add chicken and vegetables on top.","Drizzle gravy over the dish.","Add sliced avocado on the side."]},
{name:"Chicken, Rice & Avo",meal:"lunch",p:41,c:71,f:17,cal:606,ingredients:[{a:"150g",i:"Chicken thigh, skin-on"},{a:"200g",i:"Jasmine rice, cooked"},{a:"75g",i:"Avocado"},{a:"10g",i:"Sriracha mayo"}],steps:["Cook chicken thigh in a non-stick pan until fully cooked, then slice.","Plate cooked jasmine rice, sliced chicken and avocado.","Drizzle sriracha mayo over the chicken or serve as a side dip."]},
{name:"Easy Tomato Chicken Panini",meal:"lunch",p:45,c:60,f:22,cal:632,ingredients:[{a:"95g",i:"White panini roll"},{a:"100g",i:"Chicken thigh, cooked"},{a:"30g",i:"Sun-dried tomatoes"},{a:"20g",i:"Italian olive dip"},{a:"10g",i:"Balsamic glaze"},{a:"15g",i:"Full-fat cheddar, grated"}],steps:["Slice the panini roll in half and spread the olive dip on one side.","Layer cooked chicken, sun-dried tomatoes and grated cheese on the roll.","Drizzle balsamic glaze over the filling.","Toast in a sandwich press or oven until the cheese melts and the bread is golden."]},
{name:"Tuna Avocado Quinoa Salad",meal:"lunch",p:36,c:33,f:25,cal:499,ingredients:[{a:"100g",i:"Quinoa, cooked"},{a:"50g",i:"Cherry tomatoes"},{a:"50g",i:"Cucumber"},{a:"50g",i:"Avocado"},{a:"100g",i:"Chickpeas, canned"},{a:"5g",i:"Extra virgin olive oil"},{a:"10g",i:"Lemon juice"},{a:"95g",i:"Chilli tuna"}],steps:["In a bowl, combine quinoa, cherry tomatoes, cucumber, avocado, chickpeas and tuna.","Drizzle with olive oil and lemon juice.","Season with salt and pepper. Toss well and serve chilled."]},
{name:"Easy Chicken Nachos",meal:"lunch",p:45,c:43,f:33,cal:660,ingredients:[{a:"120g",i:"Pulled chicken, roasted"},{a:"46g",i:"Corn tortilla chips"},{a:"75g",i:"Black beans"},{a:"30g",i:"Full-fat cheddar, shredded"},{a:"60g",i:"Mild salsa"},{a:"50g",i:"Avocado"}],steps:["Spread tortilla chips on a plate or baking tray.","Layer shredded chicken, black beans and salsa evenly over the chips.","Sprinkle shredded cheese on top and place under a grill until cheese melts.","Add smashed avocado on top before serving."]},
{name:"Tuna Cous Cous Salad",meal:"lunch",p:30,c:43,f:13,cal:405,ingredients:[{a:"40g",i:"Couscous, dry"},{a:"2g",i:"Stock cube"},{a:"75g",i:"Peas, frozen"},{a:"70g",i:"Chilli tuna"},{a:"60g",i:"Cherry tomatoes"},{a:"100g",i:"Cucumber"},{a:"5g",i:"Extra virgin olive oil"},{a:"2g",i:"Dijon mustard"},{a:"25g",i:"Lemon juice"}],steps:["Boil water, mix with couscous and stock in a bowl, cover 5 minutes, then fluff with a fork.","Boil peas 2 minutes. Drain and rinse under cold water.","Mix olive oil, mustard, lemon juice, salt and pepper in a jar to make dressing.","In a bowl, combine couscous, peas, tuna, tomatoes, cucumber and spring onions.","Pour dressing over salad and mix gently."]},
{name:"Chicken Crackers",meal:"lunch",p:49,c:31,f:16,cal:465,ingredients:[{a:"25g",i:"Original cruskits"},{a:"50g",i:"Avocado"},{a:"50g",i:"Cucumber"},{a:"20g",i:"Celery"},{a:"20g",i:"Brown onion"},{a:"50g",i:"Tzatziki"},{a:"150g",i:"Slow-cooked pulled chicken"},{a:"10g",i:"Balsamic glaze"}],steps:["Spread tzatziki evenly over cruskits.","Top with pulled chicken, sliced cucumber, celery and onion.","Add avocado slices and drizzle with balsamic glaze."]},
{name:"Battered Fish Sliders",meal:"lunch",p:10,c:25,f:17,cal:291,ingredients:[{a:"50g",i:"Crispy light batter hoki"},{a:"40g",i:"Sourdough bread"},{a:"15g",i:"Tartare sauce"},{a:"30g",i:"Iceberg lettuce"},{a:"30g",i:"English spinach"}],steps:["Cook battered fish according to package instructions.","Slice sourdough into slider-sized pieces and lightly toast.","Spread tartare sauce onto the toasted bread.","Place cooked fish onto the bread and assemble the sliders.","Add lettuce and spinach. Serve immediately."]},
{name:"Thai Battered Fish Burger",meal:"lunch",p:10,c:29,f:10,cal:239,ingredients:[{a:"50g",i:"Crispy light batter hoki"},{a:"20g",i:"Sweet chilli sauce"},{a:"40g",i:"Traditional wholemeal bread"},{a:"30g",i:"Asian style salad mix"}],steps:["Cook battered fish according to package instructions.","Toast the wholemeal bread to desired crispness.","Spread sweet chilli sauce onto one side of each bread slice.","Place cooked fish on one slice and top with salad mix.","Close sandwich and serve immediately."]},
{name:"Ham, Cheese & Tomato Toastie",meal:"lunch",p:30,c:34,f:14,cal:378,ingredients:[{a:"80g",i:"White sandwich bread"},{a:"75g",i:"Leg ham"},{a:"40g",i:"Tomato"},{a:"30g",i:"Full-fat mozzarella, shredded"},{a:"5g",i:"Butter"}],steps:["Butter one side of each bread slice.","Layer ham, sliced tomato and cheese on the unbuttered side of one slice.","Top with the other slice, buttered side facing out.","Cook in a pan or sandwich press until golden and cheese is melted. Serve immediately."]},
{name:"Pesto Chicken Toastie",meal:"lunch",p:35,c:36,f:23,cal:494,ingredients:[{a:"80g",i:"White sandwich bread"},{a:"75g",i:"Chicken thigh, skin-on"},{a:"30g",i:"Basil pesto"},{a:"30g",i:"Full-fat mozzarella, shredded"},{a:"20g",i:"Sun-dried tomato strips"},{a:"5g",i:"Butter"}],steps:["Cook chicken thigh until fully cooked. Slice or shred.","Butter one side of each bread slice.","Spread basil pesto on the unbuttered side of one slice.","Layer chicken, sun-dried tomatoes and mozzarella on top.","Top with the other slice, buttered side facing out.","Cook in a pan or sandwich press until golden and cheese is melted."]},
{name:"Ham & Cheese Muffin",meal:"lunch",p:35,c:27,f:8,cal:317,ingredients:[{a:"67g",i:"English muffin"},{a:"100g",i:"Egg whites"},{a:"80g",i:"Leg ham, thinly sliced"},{a:"20g",i:"Full-fat cheddar, shredded"},{a:"10g",i:"Tangy tomato sauce"}],steps:["Toast the English muffin halves until golden.","Cook egg whites in a non-stick pan until set.","Heat ham slices until warmed through.","Assemble the muffin with ham, egg whites, shredded cheese and tomato sauce. Serve immediately."]},
{name:"Ham, Cheese & Mayo Sandwich",meal:"lunch",p:33,c:74,f:12,cal:536,ingredients:[{a:"166g",i:"Traditional wholemeal bread"},{a:"10g",i:"99% fat-free mayo"},{a:"80g",i:"Shaved leg ham"},{a:"20g",i:"Tomato"},{a:"15g",i:"Lettuce, shredded"},{a:"21g",i:"Full-fat cheddar, shredded"}],steps:["Spread mayo on one slice of bread.","Layer ham, tomato slices, shredded lettuce and cheese on top.","Place the second slice of bread on top, press gently, and serve."]},
{name:"Simple Chicken & Rice with Tzatziki",meal:"lunch",p:27,c:39,f:2,cal:283,ingredients:[{a:"100g",i:"Chicken thigh, skin-on"},{a:"100g",i:"White rice, cooked"},{a:"60g",i:"Cherry tomatoes"},{a:"60g",i:"Cucumber"},{a:"15g",i:"Tzatziki"}],steps:["Cook chicken thigh until fully cooked, then slice.","Cook rice as per package instructions.","Slice cherry tomatoes and cucumber.","Serve chicken and rice with sliced tomatoes, cucumber and a dollop of tzatziki on the side."]},
{name:"Chicken Katsu Sandwich",meal:"lunch",p:20,c:47,f:18,cal:433,ingredients:[{a:"100g",i:"Chicken schnitzel"},{a:"74g",i:"White sandwich bread"},{a:"10g",i:"Tonkatsu sauce"},{a:"10g",i:"Kewpie mayonnaise"},{a:"40g",i:"White cabbage"}],steps:["Cook chicken schnitzel per package instructions.","Toast bread lightly.","Spread tonkatsu sauce and mayo on bread.","Add chicken and cabbage, then close sandwich and serve."]},
{name:"Crispy Chicken & Slaw Sandwich",meal:"lunch",p:25,c:43,f:20,cal:456,ingredients:[{a:"100g",i:"Chicken schnitzel"},{a:"50g",i:"Brioche hamburger bun"},{a:"50g",i:"Fine cut coleslaw"},{a:"10g",i:"Burger pickles"},{a:"20g",i:"Full-fat cheddar slice"},{a:"10g",i:"Mayonnaise"}],steps:["Cook chicken schnitzel until golden and fully cooked.","Toast brioche bun lightly.","Layer coleslaw on bun base, top with chicken.","Add cheese, pickles and mayo. Add bun lid and serve."]},
{name:"Spicy Beef Sandwich",meal:"lunch",p:42,c:34,f:19,cal:474,ingredients:[{a:"150g",i:"Beef rump steak, lean"},{a:"72g",i:"Sourdough bread"},{a:"20g",i:"Jalapeno, raw"},{a:"20g",i:"Full-fat cheddar, reduced fat"},{a:"15g",i:"Chipotle mayonnaise"}],steps:["Season and cook beef to desired doneness. Slice thinly.","Toast sourdough lightly.","Spread chipotle mayo on bread.","Layer beef, jalapeno and cheese slices. Close sandwich and serve."]},
{name:"Grilled Chicken Sandwich",meal:"lunch",p:45,c:47,f:13,cal:482,ingredients:[{a:"150g",i:"Chicken thigh, skin-on"},{a:"100g",i:"Turkish roll"},{a:"40g",i:"Cos lettuce"},{a:"40g",i:"Tomato"},{a:"10g",i:"Garlic aioli"}],steps:["Pound chicken thigh flat. Cook in a pan until golden and cooked through.","Lightly toast Turkish roll.","Spread aioli on roll. Add chicken, lettuce and tomato. Close and serve."]},
{name:"Prawn Rice Paper Rolls",meal:"lunch",p:16,c:31,f:2,cal:209,ingredients:[{a:"40g",i:"Rice paper wrappers"},{a:"50g",i:"Prawns, cooked"},{a:"15g",i:"Vermicelli rice noodles"},{a:"20g",i:"Iceberg lettuce"},{a:"2g",i:"Fresh mint"},{a:"20g",i:"Bean sprouts"},{a:"15g",i:"Hoisin sauce"},{a:"2g",i:"Garlic, fresh"}],steps:["Mix hoisin sauce, a splash of water and garlic. Microwave 15-20 seconds. Stir until smooth.","Slice prawns in half lengthwise. Soak vermicelli in warm water 2 minutes. Drain.","Dip one rice paper sheet in warm water 2-3 seconds. Place on a clean surface.","Lay prawns near the top. Add lettuce, noodles, bean sprouts and mint in the centre.","Fold in the sides, then roll tightly from the bottom up.","Serve with hoisin dipping sauce."]},
{name:"Kangaroo Burger",meal:"lunch-dinner",p:46,c:42,f:10,cal:448,ingredients:[{a:"200g",i:"Kangaroo mince"},{a:"1",i:"Brioche or sourdough bun"},{a:"1 tbsp",i:"Raw honey"},{a:"1 slice",i:"Full-fat cheddar"},{a:"lettuce, tomato",i:"For serving"},{a:"pinch",i:"Sea salt"}],steps:["Mix kangaroo mince with salt and form into a patty.","Cook in a pan over medium-high heat, 3\u20134 minutes per side.","Place cheese on patty in the last minute to melt.","Toast bun. Assemble burger with lettuce, tomato and a drizzle of honey."],coach:"Kangaroo is the highest-protein, lowest-fat burger in the system. The full-fat cheddar provides calcium and fat-soluble vitamins. Honey on a burger sounds unusual \u2014 it's excellent."},
{name:"Honey Soy Chicken Bowl",meal:"lunch-dinner",p:46,c:73,f:12,cal:590,ingredients:[{a:"160g",i:"Chicken thigh, skin-on"},{a:"125g",i:"White rice, cooked"},{a:"30g",i:"Honey soy sauce"},{a:"100g",i:"Broccoli"},{a:"100g",i:"Brown onion"},{a:"100g",i:"Red capsicum"},{a:"15g",i:"Kewpie mayonnaise"}],steps:["Cook chicken thigh skin-side down for 5-6 minutes until golden and crispy.","Flip and cook a further 4 minutes. Add vegetables and cook 1 minute.","Pour honey soy sauce into pan and cook until thickened.","Serve rice in a bowl, top with chicken, steamed broccoli and a dollop of mayo."]},
{name:"Beef Stir Fry Noodles",meal:"lunch-dinner",p:55,c:90,f:10,cal:672,ingredients:[{a:"150g",i:"Lean beef stir-fry strips"},{a:"220g",i:"Hokkien noodles"},{a:"37g",i:"Teriyaki marinade"},{a:"150g",i:"Oriental stir-fry vegetables"},{a:"100g",i:"Brown onion"},{a:"100g",i:"Red capsicum"},{a:"5g",i:"Olive oil"}],steps:["Heat olive oil in a wok over medium-high heat.","Add beef strips and cook until browned, 2-3 minutes.","Add oriental vegetables and cook a further 2 minutes.","Stir in teriyaki marinade and cook until beef is fully cooked.","Add noodles and toss to combine. Cook 1-2 minutes until heated through."]},
{name:"Beef Burrito Bowl",meal:"lunch-dinner",p:48,c:58,f:22,cal:628,ingredients:[{a:"140g",i:"Extra lean beef mince"},{a:"125g",i:"White rice, cooked"},{a:"5g",i:"Old El Paso spice mix"},{a:"75g",i:"Black beans"},{a:"25g",i:"Parmigiano Reggiano, grated"},{a:"50g",i:"Avocado"},{a:"30g",i:"Lettuce"},{a:"50g",i:"Tomato"}],steps:["Cook beef mince in a pan over medium heat until browned.","Add spice mix and stir to coat. Cook 1-2 minutes.","Assemble bowl: rice as the base, then beef, black beans, lettuce, tomato and avocado.","Top with grated Parmigiano Reggiano."],coach:"Parmigiano Reggiano is the preferred cheese -- aged, low-lactose, high in tyrosine which supports dopamine production."},
{name:"Beef Nachos",meal:"lunch-dinner",p:46,c:44,f:36,cal:700,ingredients:[{a:"120g",i:"Extra lean beef mince"},{a:"46g",i:"Corn tortilla chips"},{a:"75g",i:"Black beans"},{a:"30g",i:"Parmigiano Reggiano, grated"},{a:"50g",i:"Avocado"},{a:"5g",i:"Old El Paso spice mix"}],steps:["Cook beef mince with spice mix until browned and cooked through.","Spread tortilla chips on a plate or baking tray.","Layer cooked beef and black beans evenly over the chips.","Sprinkle Parmigiano over the top and place under a grill until melted.","Add smashed avocado on top before serving."]},
{name:"Honey Chipotle Bowls",meal:"lunch-dinner",p:39,c:44,f:15,cal:468,ingredients:[{a:"136g",i:"Beef tenderloin steak"},{a:"260g",i:"Potato, new"},{a:"9g",i:"Chipotle in adobo sauce"},{a:"50g",i:"Full-fat Greek yoghurt"},{a:"3g",i:"Garlic, minced"},{a:"6g",i:"Raw honey"},{a:"1g",i:"Avocado oil"}],steps:["Cut potatoes into wedges, coat with avocado oil and season. Air fry until golden.","Season steak and cook in a pan until desired doneness. Rest before slicing.","Mix chipotle, honey and garlic in a small bowl to make a sauce.","Add potato wedges to a bowl and layer steak slices on top.","Pour sauce over steak and finish with a dollop of Greek yoghurt."]},
{name:"Crispy Salt & Pepper Chicken & Chips",meal:"lunch-dinner",p:44,c:30,f:5,cal:341,ingredients:[{a:"175g",i:"Chicken thigh, skin-on"},{a:"200g",i:"Spudlite potato"},{a:"4g",i:"Dark soy sauce"},{a:"6g",i:"Cornflour"},{a:"1g",i:"Olive oil"},{a:"38g",i:"Brown onion"},{a:"50g",i:"Green capsicum"},{a:"50g",i:"Red capsicum"}],steps:["Cut potatoes into chips, coat with olive oil and air fry until crispy.","Toss diced chicken thigh with cornflour and soy sauce, then cook in a pan until crispy.","Saute sliced onion and capsicums in the same pan.","Serve chicken and veggies with chips."]},
{name:"Beef Chilli Con Carne",meal:"lunch-dinner",p:39,c:24,f:7,cal:315,ingredients:[{a:"125g",i:"Lean beef mince"},{a:"100g",i:"Crushed tomatoes"},{a:"100g",i:"Red kidney beans"},{a:"50g",i:"Brown onion"},{a:"50g",i:"Red capsicum"},{a:"1g",i:"Olive oil"},{a:"1g",i:"Garlic, minced"}],steps:["Heat olive oil in a pan and saute garlic and diced onion until softened.","Add beef mince and cook until browned.","Stir in chopped capsicum, tomatoes and kidney beans.","Simmer until sauce thickens and flavours combine.","Serve with potatoes, rice or wrap of choice."]},
{name:"Honey Buffalo Chicken Tenders",meal:"lunch-dinner",p:36,c:21,f:7,cal:286,ingredients:[{a:"125g",i:"Chicken thigh, skin-on"},{a:"1",i:"Egg, medium"},{a:"20g",i:"Crunchy corn flakes, crushed"},{a:"25g",i:"Buffalo hot sauce"},{a:"5g",i:"Raw honey"}],steps:["Preheat oven to 180C and line a baking tray.","Crush corn flakes into fine crumbs. Whisk egg in a bowl.","Dip chicken into egg, then coat with crushed corn flakes.","Bake 15-20 minutes until golden and cooked through.","Heat hot sauce and honey in a small saucepan until combined.","Serve chicken tenders with sauce drizzled over."]},
{name:"Chicken Pasta Bake",meal:"lunch-dinner",p:48,c:64,f:30,cal:740,ingredients:[{a:"125g",i:"Chicken thigh, skin-on"},{a:"200g",i:"Crushed tomatoes"},{a:"37g",i:"Brown onion"},{a:"1g",i:"Garlic, minced"},{a:"7g",i:"Olive oil"},{a:"75g",i:"Penne pasta"},{a:"22g",i:"Mascarpone"},{a:"17g",i:"Full-fat cheddar"},{a:"12g",i:"Full-fat mozzarella"}],steps:["Cook penne according to package instructions. Drain.","Saute garlic and diced onion in olive oil until softened.","Add diced chicken thigh and cook until browned.","Stir in crushed tomatoes and simmer until sauce thickens.","Mix in mascarpone, cheddar and mozzarella until melted.","Toss cooked penne with the sauce and serve warm."]},
{name:"Pesto Chicken Bagel",meal:"lunch-dinner",p:52,c:60,f:18,cal:620,ingredients:[{a:"150g",i:"Chicken thigh, skin-on"},{a:"20g",i:"Basil pesto"},{a:"30g",i:"Full-fat thickened cream"},{a:"90g",i:"Plain bagel"},{a:"20g",i:"Prosciutto"},{a:"50g",i:"Red capsicum"}],steps:["Cook chicken thigh until golden and cooked through, then slice.","In the same pan, heat basil pesto and cream, stirring until combined into a sauce.","Toast the bagel halves until golden.","Layer prosciutto, sliced chicken and capsicum on one half of the bagel.","Drizzle with pesto cream sauce and top with the other half."]},
{name:"Philly Cheesesteak Bagel",meal:"lunch-dinner",p:57,c:65,f:22,cal:690,ingredients:[{a:"90g",i:"Plain bagel"},{a:"150g",i:"Lean beef stir-fry strips"},{a:"50g",i:"Brown onion"},{a:"50g",i:"Jalapeno, raw"},{a:"50g",i:"Red capsicum"},{a:"20g",i:"Full-fat cheddar"},{a:"10g",i:"Garlic aioli"}],steps:["Toast bagel halves until golden.","Cook beef strips in a pan until browned. Set aside.","In the same pan, saute sliced onion, capsicum and jalapeno until softened.","Return beef to the pan and mix with vegetables.","Layer beef mixture on the bottom half of the bagel, top with cheese and melt under a grill.","Spread garlic aioli on the top half, then assemble and serve."]},
{name:"Spaghetti Bolognese",meal:"lunch-dinner",p:57,c:69,f:22,cal:705,ingredients:[{a:"200g",i:"Extra lean beef mince"},{a:"80g",i:"Pasta shells"},{a:"20g",i:"Full-fat cheddar, sliced"},{a:"15g",i:"Brown onion"},{a:"40g",i:"Carrot"},{a:"80g",i:"Bolognese pasta sauce"}],steps:["Cook pasta shells according to package instructions. Drain.","Saute diced onion and grated carrot until softened.","Add beef mince and cook until browned.","Stir in pasta sauce and simmer until heated through.","Fill cooked pasta shells with the beef mixture.","Top with cheese slices and place under a grill until melted."]},
{name:"Lamb Steak Wrap",meal:"lunch-dinner",p:51,c:33,f:32,cal:650,ingredients:[{a:"200g",i:"Lamb fillet, lean"},{a:"71g",i:"Spinach wrap"},{a:"15g",i:"Full-fat cheddar, grated"},{a:"15g",i:"Brown onion"},{a:"15g",i:"Garlic aioli"}],steps:["Cook lamb steak in a pan until desired doneness, then slice thinly.","Spread garlic aioli over the wrap.","Add sliced onion, grated cheese and lamb slices to the centre of the wrap.","Roll tightly, toast if preferred, then serve."]},
{name:"Scotch Fillet & Rice",meal:"lunch-dinner",p:68,c:71,f:28,cal:836,ingredients:[{a:"250g",i:"Beef scotch fillet, lean"},{a:"200g",i:"Jasmine rice, cooked"},{a:"10g",i:"Kewpie mayonnaise"},{a:"80g",i:"Asparagus, green"},{a:"10g",i:"Ghee"}],steps:["Cook scotch fillet steak in a pan with ghee until desired doneness, then rest before slicing.","Steam or pan-fry asparagus until tender.","Serve cooked jasmine rice topped with sliced steak and asparagus.","Drizzle with mayonnaise before serving."]},
{name:"Butter Chicken",meal:"lunch-dinner",p:35,c:52,f:10,cal:440,ingredients:[{a:"125g",i:"Chicken thigh, skin-on"},{a:"125g",i:"Butter chicken simmer sauce"},{a:"50g",i:"White rice, uncooked"},{a:"100g",i:"Mixed vegetables, frozen"}],steps:["Cook rice as per package instructions.","Cook diced chicken thigh in a pan, then add simmer sauce and heat through.","Steam or microwave vegetables.","Serve chicken over rice with vegetables."]},
{name:"Beef Enchiladas",meal:"lunch-dinner",p:54,c:27,f:22,cal:530,ingredients:[{a:"150g",i:"Extra lean beef mince"},{a:"10g",i:"Taco spice mix"},{a:"20g",i:"Full-fat cheddar, grated"},{a:"50g",i:"Low-carb wholemeal wrap"},{a:"50g",i:"Red capsicum"},{a:"50g",i:"Black beans"},{a:"20g",i:"Corn kernels"},{a:"20g",i:"Mild salsa"}],steps:["Cook beef mince in a pan with taco spice mix until browned.","Add black beans, diced capsicum, corn and salsa. Cook until heated through.","Spoon beef mixture onto wrap, roll tightly and place seam-side down in a baking dish.","Sprinkle grated cheese over the wraps and bake at 180C until cheese melts."]},
{name:"Kangaroo Burger & Chips",meal:"lunch-dinner",p:35,c:64,f:14,cal:526,ingredients:[{a:"34g",i:"Burger thin bun"},{a:"110g",i:"Kangaroo burger pattie"},{a:"17g",i:"Full-fat cheddar slice"},{a:"100g",i:"Mixed vegetables, frozen"},{a:"5g",i:"Extra virgin olive oil"},{a:"400g",i:"Spudlite potato"},{a:"30g",i:"Tomato sauce, reduced salt"}],steps:["Cut potatoes into chips, coat with olive oil and air fry or bake until golden.","Cook kangaroo pattie in a pan until browned and cooked through.","Toast burger bun and assemble with pattie, cheese and tomato sauce.","Steam mixed vegetables and serve alongside burger with chips."]},
{name:"Satay Chicken",meal:"lunch-dinner",p:29,c:47,f:18,cal:462,ingredients:[{a:"87g",i:"Chicken thigh, skin-on"},{a:"5g",i:"Extra virgin olive oil"},{a:"8g",i:"Satay recipe base"},{a:"55ml",i:"Salt-reduced chicken stock"},{a:"55g",i:"Light coconut cream"},{a:"10g",i:"Peanut butter"},{a:"109g",i:"Mixed vegetables, frozen"},{a:"100g",i:"Jasmine rice, cooked"}],steps:["Cook chicken thigh in a pan with olive oil until browned.","Add satay base, chicken stock, coconut cream and peanut butter. Stir until combined.","Simmer until sauce thickens and chicken is cooked through.","Steam mixed vegetables.","Serve chicken and sauce over cooked rice with vegetables on the side."]},
{name:"Chicken Schnitzel Wrap",meal:"lunch-dinner",p:32,c:55,f:19,cal:523,ingredients:[{a:"150g",i:"Chicken thigh schnitzel"},{a:"71g",i:"Original wrap"},{a:"30g",i:"Lettuce, shredded"},{a:"60g",i:"Cucumber"},{a:"60g",i:"Red capsicum"},{a:"20g",i:"Tomato sauce, reduced salt"}],steps:["Cook chicken schnitzel and slice into strips.","Lay the wrap flat and spread sauce evenly.","Add lettuce, cucumber and capsicum to the centre of the wrap.","Place sliced schnitzel on top.","Wrap tightly and serve."]},
{name:"Chicken Burger",meal:"lunch-dinner",p:42,c:40,f:14,cal:458,ingredients:[{a:"40g",i:"Sandwich thin bun"},{a:"3g",i:"Olive oil"},{a:"125g",i:"Chicken thigh, skin-on"},{a:"15g",i:"Lettuce, shredded"},{a:"50g",i:"Tomato"},{a:"2g",i:"Burger pickles"},{a:"25g",i:"Full-fat cheddar, shredded"},{a:"20g",i:"BBQ sauce, reduced salt"},{a:"100g",i:"Potato, pale skin"}],steps:["Slice potato into wedges, toss with olive oil and bake at 200C for 25-30 minutes.","Cook chicken thigh in a non-stick pan or grill until fully cooked.","Toast the sandwich thin lightly.","Assemble the burger with lettuce, tomato, pickles, chicken, cheese and BBQ sauce.","Serve with potato wedges on the side."]},
{name:"Lasagne",meal:"lunch-dinner",p:43,c:81,f:24,cal:712,ingredients:[{a:"63g",i:"Lasagne sheet"},{a:"100g",i:"Extra lean beef mince"},{a:"20g",i:"Red onion"},{a:"50g",i:"Zucchini"},{a:"50g",i:"Carrot"},{a:"50g",i:"Diced tomatoes"},{a:"10g",i:"Tomato paste"},{a:"5g",i:"Olive oil"},{a:"25g",i:"Full-fat cheddar, shredded"}],steps:["Preheat oven to 180C.","Heat olive oil in a pan, cook beef mince until browned. Add diced onion, grated zucchini and carrot. Cook until softened.","Stir in diced tomatoes and tomato paste. Simmer 5-7 minutes.","Layer lasagne sheets, meat sauce and shredded cheese in a baking dish. Repeat, finishing with cheese on top.","Bake 25-30 minutes until golden and bubbling. Rest 5 minutes before serving."]},
{name:"Mac and Cheese",meal:"lunch-dinner",p:47,c:77,f:18,cal:670,ingredients:[{a:"125g",i:"Chicken thigh, skin-on"},{a:"20g",i:"Full-fat cheddar, shredded"},{a:"100g",i:"Pasta elbows"},{a:"80g",i:"Three cheese pasta bake sauce"}],steps:["Cook pasta according to package instructions. Drain and set aside.","Dice chicken thigh and cook in a non-stick pan until fully cooked.","In the same pan, add pasta bake sauce and heat through.","Combine cooked pasta, chicken and sauce in a baking dish.","Sprinkle shredded cheese on top and bake at 180C for 10-15 minutes until cheese is melted and golden."]},
{name:"Shepherd's Pie",meal:"lunch-dinner",p:44,c:29,f:14,cal:430,ingredients:[{a:"150g",i:"Extra lean beef mince"},{a:"150g",i:"Spudlite potato"},{a:"100g",i:"Peas, corn & capsicum mix"},{a:"50g",i:"Brown onion"},{a:"15g",i:"Full-fat cheddar, shredded"}],steps:["Boil and mash potatoes. Set aside.","Cook beef mince, onion and vegetables in a pan until softened.","Layer beef mixture in a dish, top with mashed potato and cheese.","Bake at 180C for 20-25 minutes until golden.","Serve warm."]},
{name:"Peri Peri Chicken Pizza",meal:"lunch-dinner",p:52,c:34,f:26,cal:590,ingredients:[{a:"100g",i:"High-protein thin crust pizza base"},{a:"40g",i:"Pizza sauce"},{a:"100g",i:"Chicken thigh, skin-on"},{a:"40g",i:"Red capsicum"},{a:"40g",i:"Mushroom"},{a:"40g",i:"Full-fat mozzarella, shredded"},{a:"10g",i:"Spinach"},{a:"10g",i:"Perinaise sauce"},{a:"10g",i:"BBQ sauce"}],steps:["Preheat oven to 200C.","Spread pizza sauce evenly over the pizza base.","Cook and dice chicken thigh, then layer on the base along with sliced capsicum, mushroom, spinach and cheese.","Drizzle with Perinaise and BBQ sauce.","Bake 10-12 minutes until cheese is melted and golden."]},
{name:"Chicken Buddha Bowl",meal:"lunch-dinner",p:58,c:26,f:16,cal:490,ingredients:[{a:"220g",i:"Chicken thigh, skin-on"},{a:"100g",i:"Quinoa, cooked"},{a:"100g",i:"Cucumber"},{a:"100g",i:"Cherry tomatoes"},{a:"100g",i:"Green beans, boiled"},{a:"85g",i:"Avocado"},{a:"20g",i:"Light soy sauce"}],steps:["Cook chicken thigh skin-side down until crispy, then flip and finish cooking. Slice.","Cook quinoa and place in a bowl as the base.","Arrange cucumber, tomatoes, green beans and avocado around the bowl.","Place sliced chicken on top and drizzle with soy sauce."]},
{name:"Beef Souvlaki Wraps",meal:"lunch-dinner",p:59,c:39,f:10,cal:482,ingredients:[{a:"160g",i:"Lean beef stir-fry strips"},{a:"1",i:"Souvlaki bread"},{a:"50g",i:"Baby spinach"},{a:"50g",i:"Cherry tomatoes"},{a:"40g",i:"Red onion"},{a:"70g",i:"Full-fat Greek yoghurt"},{a:"20g",i:"Lemon juice"},{a:"50g",i:"Cucumber"}],steps:["Season beef strips and cook in a pan until browned and cooked through.","Mix yoghurt and lemon juice to make a sauce. Season with salt.","Warm the souvlaki bread.","Layer spinach, tomatoes, cucumber, onion and beef in the bread.","Drizzle yoghurt sauce over and wrap to serve."]},
{name:"Asian Beef Noodles",meal:"lunch-dinner",p:44,c:58,f:11,cal:504,ingredients:[{a:"150g",i:"Extra lean beef mince"},{a:"20g",i:"Stir-fry marinade sauce"},{a:"165g",i:"Golden hokkien noodles"},{a:"50g",i:"Red capsicum"},{a:"50g",i:"Zucchini"},{a:"50g",i:"Mushroom"},{a:"3g",i:"Sesame seeds"}],steps:["Cook noodles according to package instructions. Set aside.","Cook beef mince in a pan until browned.","Add capsicum, zucchini and mushrooms. Cook until tender.","Stir in stir-fry sauce and mix well.","Combine noodles with the beef mixture and toss to coat.","Serve sprinkled with sesame seeds."]},
{name:"Sticky Chicken Rice Bowl",meal:"lunch-dinner",p:46,c:94,f:24,cal:796,ingredients:[{a:"100g",i:"Chicken thigh, skin-on, cooked"},{a:"250g",i:"Long grain white rice, cooked"},{a:"10g",i:"Sesame oil"},{a:"1",i:"Medium egg"},{a:"180g",i:"Mixed vegetables, frozen"},{a:"15g",i:"Soy sauce"},{a:"5g",i:"Cornflour"},{a:"20g",i:"Raw honey"},{a:"8g",i:"Rice wine vinegar"}],steps:["Heat rice and set aside. Scramble the egg and set aside.","Stir-fry mixed vegetables in a non-stick pan until tender.","Mix soy sauce, honey, rice vinegar and cornflour to form a slurry.","Add cooked chicken and sauce mixture to the pan, stirring until sauce thickens.","Assemble the bowl with rice, vegetables, chicken and scrambled egg.","Drizzle sesame oil on top before serving."]},
{name:"Turkey Mince Stir Fry",meal:"lunch-dinner",p:57,c:29,f:16,cal:490,ingredients:[{a:"200g",i:"Turkey mince"},{a:"160g",i:"Red capsicum"},{a:"160g",i:"Bok choy"},{a:"8g",i:"Sesame oil"},{a:"270g",i:"Konjac noodles"},{a:"72g",i:"Chicken & cashew stir-fry sauce"}],steps:["Heat sesame oil in a wok over medium-high heat.","Add turkey mince and cook until browned, breaking it apart as it cooks.","Add bok choy and capsicum and stir-fry until tender.","Drain and rinse konjac noodles and add to the pan.","Pour in stir-fry sauce and toss everything to combine. Serve immediately."]},
