<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ — Reboot Method</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* Reboot Method — Shared Guide Styles */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #181818;
  --border: #1e1e1e;
  --border-light: #282828;
  --text: #f5f5f0;
  --muted: rgba(245,245,240,0.45);
  --muted2: rgba(245,245,240,0.2);
  --yellow: #FFE033;
  --yellow-dim: rgba(255,224,51,0.08);
  --yellow-mid: rgba(255,224,51,0.15);
}

html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; scroll-behavior: smooth; }

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse 100% 40% at 50% 0%, rgba(255,224,51,0.05) 0%, transparent 65%),
    var(--bg);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(245,245,240,0.055) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  z-index: 0;
}

.wrap { max-width: 820px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

/* NAV */
.top-nav {
  padding: 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  letter-spacing: 0.04em;
  transition: color 0.2s;
}
.back-link:hover { color: var(--yellow); }
.back-link svg { transition: transform 0.2s; }
.back-link:hover svg { transform: translateX(-3px); }

.brand-mark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.12em;
  color: var(--yellow);
  opacity: 0.65;
}

/* HERO */
.page-hero {
  padding: 56px 0 48px;
  border-bottom: 1px solid var(--border);
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--yellow);
  margin-bottom: 18px;
}
.hero-eyebrow::before {
  content: '';
  display: block;
  width: 18px;
  height: 1px;
  background: var(--yellow);
}

.page-hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5.5vw, 3.2rem);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.01em;
  margin-bottom: 16px;
}
.page-hero h1 em { font-style: italic; color: var(--yellow); }

.hero-intro {
  font-size: 1rem;
  color: var(--muted);
  line-height: 1.7;
  max-width: 600px;
  font-weight: 400;
}

/* KEY TAKEAWAYS BOX */
.takeaways {
  background: var(--yellow-dim);
  border: 1px solid rgba(255,224,51,0.18);
  border-left: 3px solid var(--yellow);
  border-radius: 4px;
  padding: 24px 28px;
  margin: 40px 0;
}
.takeaways-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--yellow);
  margin-bottom: 14px;
}
.takeaways ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.takeaways ul li {
  font-size: 0.88rem;
  color: var(--text);
  line-height: 1.55;
  padding-left: 20px;
  position: relative;
}
.takeaways ul li::before {
  content: '→';
  position: absolute;
  left: 0;
  color: var(--yellow);
  font-size: 0.8rem;
}

/* CONTENT SECTIONS */
.content-body { padding: 48px 0 80px; }

.guide-section { margin-bottom: 52px; }
.guide-section:last-child { margin-bottom: 0; }

.section-header {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.section-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  color: var(--yellow);
  opacity: 0.35;
  line-height: 1;
  flex-shrink: 0;
}
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text);
}

.guide-section p {
  font-size: 0.92rem;
  line-height: 1.75;
  color: rgba(245,245,240,0.8);
  margin-bottom: 16px;
}
.guide-section p:last-child { margin-bottom: 0; }

.guide-section p strong { color: var(--text); font-weight: 600; }

/* CALLOUT BLOCK */
.callout {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 4px;
  padding: 20px 24px;
  margin: 20px 0;
}
.callout-label {
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--yellow);
  margin-bottom: 8px;
}
.callout p { font-size: 0.88rem; color: var(--muted); margin: 0; }

/* PILLAR GRID */
.pillar-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  margin: 20px 0;
}
.pillar-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 4px;
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.pillar-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--yellow);
  opacity: 0.5;
}
.pillar-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  color: var(--yellow);
  opacity: 0.2;
  line-height: 1;
  margin-bottom: 6px;
}
.pillar-name {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.pillar-desc { font-size: 0.77rem; color: var(--muted); line-height: 1.5; }

/* RULE LIST */
.rule-list { list-style: none; display: flex; flex-direction: column; gap: 14px; margin: 20px 0; }
.rule-list li {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  font-size: 0.9rem;
  line-height: 1.6;
  color: rgba(245,245,240,0.8);
}
.rule-list li .rule-badge {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  background: var(--yellow-dim);
  border: 1px solid rgba(255,224,51,0.2);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--yellow);
  margin-top: 2px;
}

/* FOOTER */
footer {
  border-top: 1px solid var(--border);
  padding: 28px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.footer-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.95rem;
  letter-spacing: 0.1em;
  color: var(--yellow);
  opacity: 0.5;
}
.footer-copy { font-size: 0.62rem; color: var(--muted2); }

@media (max-width: 600px) {
  .pillar-grid { grid-template-columns: 1fr; }
  .page-hero { padding: 40px 0 36px; }
}
@media (prefers-reduced-motion: reduce) {
  .back-link svg { transition: none; }
}

.faq-body { padding: 40px 0 80px; }

.faq-category { margin-bottom: 48px; }
.faq-category-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  font-weight: 700;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.faq-category-title .cat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  color: var(--yellow);
  opacity: 0.3;
}

.faq-item {
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}
.faq-question {
  width: 100%;
  background: none;
  border: none;
  text-align: left;
  padding: 18px 0;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.92rem;
  font-weight: 600;
  line-height: 1.4;
  transition: color 0.2s;
}
.faq-question:hover { color: var(--yellow); }
.faq-icon {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  border: 1px solid var(--border-light);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  color: var(--muted);
  transition: all 0.2s;
  margin-top: 1px;
  line-height: 1;
}
.faq-item.open .faq-icon { border-color: var(--yellow); color: var(--yellow); transform: rotate(45deg); }
.faq-answer {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s ease;
  font-size: 0.88rem;
  line-height: 1.75;
  color: rgba(245,245,240,0.75);
  padding: 0;
}
.faq-item.open .faq-answer {
  max-height: 600px;
  padding-bottom: 20px;
}
.faq-answer p { margin-bottom: 12px; }
.faq-answer p:last-child { margin-bottom: 0; }
.faq-answer strong { color: var(--text); font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">

  <nav class="top-nav">
    <a href="index.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to Resources
    </a>
    <span class="brand-mark">REBOOT METHOD</span>
  </nav>

  <section class="page-hero">
    <p class="hero-eyebrow">Reference</p>
    <h1>Frequently Asked<br><em>Questions</em></h1>
    <p class="hero-intro">The questions every new client asks in the first month. Read through these before your next check-in — chances are your question is already answered here.</p>
  </section>

  <div class="faq-body" id="faq-container"></div>

  <footer>
    <span class="footer-brand">REBOOT METHOD</span>
    <span class="footer-copy">© 2026 The Reboot Method. All rights reserved.</span>
  </footer>

</div>

<script>
const faqs = [
  {
    category: 'Nutrition',
    items: [
      {
        q: 'Why am I eating more than I used to and still losing fat?',
        a: '<p>Because you were previously under-eating, which suppressed your metabolic rate. When you chronically restrict calories, the body reduces thyroid output and overall energy expenditure to match the lower intake. When you start fuelling properly, the thyroid upregulates, the metabolic rate rises, and the body becomes more capable of oxidising fat at the same or higher calorie intake.</p><p>This is the core principle of the Ignition Protocol: fix the metabolism first, then let body recomposition happen as a byproduct of a well-functioning system. The scale may not move — or may even go up initially as glycogen stores fill — but your body composition is improving.</p>'
      },
      {
        q: 'Do I really need to eat that much carbohydrate?',
        a: '<p>Yes. Carbohydrates are the primary fuel for every cell in your body and the primary driver of thyroid hormone conversion from T4 to active T3. Without adequate carbohydrate intake, T3 falls, cortisol rises, and training performance deteriorates.</p><p>The 55% carbohydrate target is not arbitrary — it is set to support your training load, maintain glycogen availability, and create the metabolic conditions required for body recomposition. Most men starting the protocol are coming from a low-carb or moderate-carb background and find performance and recovery improve significantly within two to three weeks of hitting the targets.</p>'
      },
      {
        q: 'What if I miss a meal or can\'t hit my macros one day?',
        a: '<p>One off day does not derail the protocol. Metabolic adaptation and body composition changes happen over weeks and months, not individual days. What matters is the average across the week.</p><p>If you miss a meal, prioritise protein first — hitting your carb and fat targets is secondary to maintaining daily protein intake for muscle protein synthesis. Do not try to "make up" missed calories by overeating the following day. Just return to the plan at the next meal.</p>'
      },
      {
        q: 'Why are seed oils and polyunsaturated fats minimised?',
        a: '<p>Polyunsaturated fatty acids (PUFAs), particularly linoleic acid from vegetable and seed oils, compete with thyroid hormone at the cellular receptor level and suppress mitochondrial energy production. They are also highly prone to oxidation (rancidity) in the body, contributing to low-grade inflammation.</p><p>The Ignition Protocol prioritises saturated and monounsaturated fats from whole food sources — dairy, eggs, beef, coconut, and olive oil — which are more metabolically stable and supportive of steroid hormone production including testosterone. This is not about fat being bad; it is about fat quality and source.</p>'
      },
      {
        q: 'Can I drink alcohol on the programme?',
        a: '<p>You can, but you should understand the trade-off clearly. Alcohol directly suppresses testosterone production for 12–36 hours post-consumption, elevates oestrogen, fragments sleep architecture, and impairs muscle protein synthesis in the recovery window. Two to three drinks two to three nights per week is enough to meaningfully blunt results.</p><p>Total abstinence is not required. What is required is honesty. If you are drinking regularly and not seeing results, the alcohol is almost certainly a significant factor. Log it in your check-in and your coach will address it.</p>'
      },
    ]
  },
  {
    category: 'Training',
    items: [
      {
        q: 'Why am I only doing five sessions per week and not more?',
        a: '<p>Five sessions per week is not a limitation — it is the correct training volume for the majority of men over 40 running a hypertrophy programme. More training is only better if your recovery capacity can support it. For most men, adding a sixth session simply increases cortisol load and reduces the quality of all other sessions without adding meaningful stimulus.</p><p>If you feel like you are not doing enough, the answer is usually to increase training density (shorter rest periods, more volume within sessions) rather than frequency. Discuss this with your coach before changing your programme.</p>'
      },
      {
        q: 'Do I really need to take a deload week?',
        a: '<p>Yes. A deload is not a rest week — it is a planned reduction in volume and intensity that allows accumulated fatigue to clear and adaptations to consolidate. The adaptation to training does not happen during the hard sessions; it happens during recovery. A deload week accelerates that process.</p><p>Men who skip deloads almost always plateau earlier, accumulate overuse injuries sooner, and see reduced long-term progress compared to those who programme them consistently. If you feel great going into a deload week, that is the point — you are doing it at the right time.</p>'
      },
      {
        q: 'My weight on a lift went backwards. What does that mean?',
        a: '<p>Regression in a single session is normal and rarely meaningful. Common causes: inadequate sleep the night before, a high-stress period, under-eating in the 24 hours prior, training at an unusual time, or simply a bad day. Strength output is sensitive to all of these variables.</p><p>A pattern of regression across multiple sessions in the same lift is more significant. Log it in your check-in and include context. Your coach will review your nutrition, sleep, and training load and identify whether a programming adjustment is needed.</p>'
      },
      {
        q: 'Can I do extra cardio on top of the programme?',
        a: '<p>Low-intensity steady-state cardio — walking, easy cycling, swimming at a conversational pace — is fine and encouraged. It does not meaningfully compete with hypertrophy training recovery and contributes positively to cardiovascular health and daily energy expenditure.</p><p>High-intensity cardio (HIIT, sprint sessions, intense cycling classes) is a different story. It draws from the same cortisol budget as your hypertrophy sessions and will impair recovery if stacked on top of five training days. If you want more output, walk more. The marginal benefit of HIIT over LISS for body composition does not justify the recovery cost for men on a structured hypertrophy programme.</p>'
      },
    ]
  },
  {
    category: 'Tracking & Metrics',
    items: [
      {
        q: 'My waking temperature is low. What does that mean and what do I do?',
        a: '<p>A low waking temperature (below 36.3°C) indicates metabolic suppression — the body is producing less heat (energy) than it should. This is typically caused by chronically low calorie intake, inadequate carbohydrates, poor sleep, or high stress load. It is not a fixed trait — it is a response to your environment and nutrition history.</p><p>The fix is the Ignition Protocol: hit your calorie and carbohydrate targets consistently, prioritise sleep, and manage stress. Waking temperature typically begins rising within two to four weeks of consistent protocol adherence. Track it daily and note the trend in your weekly check-in.</p>'
      },
      {
        q: 'The scale is not moving. Should I be worried?',
        a: '<p>Not necessarily. During body recomposition — building muscle while losing fat — scale weight can stay flat or even increase while body composition is improving dramatically. This happens because muscle tissue is denser than fat, and because increasing carbohydrate intake fills glycogen stores (each gram of glycogen is stored with approximately 3g of water).</p><p>Track progress through a combination of: waking temperature trend, progress photos (every 4 weeks), training performance (are you lifting more?), and how your clothes fit. DEXA scans every 3–6 months give the clearest objective picture. The scale tells you almost nothing useful in a recomposition phase.</p>'
      },
      {
        q: 'How often should I get bloodwork done?',
        a: '<p>For men in their 40s on a structured health and performance programme, quarterly bloodwork is the gold standard. At minimum, twice per year. The first panel gives you a baseline; subsequent panels track the trend.</p><p>Core panel to request: total testosterone, free testosterone, SHBG, LH, FSH, oestradiol, TSH, free T3, free T4, cortisol (fasted AM), DHEA-S, fasting glucose, HbA1c, ferritin, vitamin D (25-OH), zinc, RBC magnesium. Not all GPs will order all of these — use a private lab service if needed.</p>'
      },
    ]
  },
  {
    category: 'Coaching & The Programme',
    items: [
      {
        q: 'How honest do I need to be in my weekly check-in?',
        a: '<p>Completely honest. A check-in where you tell your coach what you think they want to hear produces coaching adjustments based on false data — which means your programme is being optimised for a client who does not exist.</p><p>If you drank more than planned, missed sessions, or had a terrible week — put it in the check-in. Your coach is not here to judge. They are here to adjust the plan based on reality. Honest data always produces better outcomes than curated data.</p>'
      },
      {
        q: 'Can I adjust my own programme if I feel it needs changing?',
        a: '<p>Talk to your coach before making changes. Most men who self-adjust either make the programme too easy (reducing volume when they feel tired, when the correct response is usually nutrition or sleep) or too hard (adding sessions or intensity when they are not recovering well).</p><p>The whole point of having a coach is the external perspective. Your coach is looking at your data, your trend, and your context — not just how you feel in the moment. Raise it in your check-in and get a directed adjustment rather than guessing.</p>'
      },
      {
        q: 'How long will it take to see results?',
        a: '<p>Visible body composition changes typically begin within 8–12 weeks of consistent protocol adherence. Meaningful waking temperature improvement typically begins within 2–4 weeks. Training performance improvements are usually felt within the first 2–3 weeks as glycogen stores normalise and training quality improves.</p><p>The timeline depends heavily on your starting point, consistency, sleep quality, and stress load. Men who are coming from years of chronic restriction and metabolic suppression may take longer to see the metabolic recovery phase complete. The process is not linear — trust the metrics, not the mirror, for the first 8 weeks.</p>'
      },
      {
        q: 'What happens if life gets in the way — travel, illness, work crises?',
        a: '<p>Life getting in the way is not a failure. It is information. Log it, adjust, and continue. The programme is designed to be adapted — not abandoned the moment circumstances change.</p><p>During travel: prioritise protein, sleep, and whatever training is available. During illness: rest, eat, do not train. During high-stress periods: reduce training volume before nutrition, because under-eating while over-stressed compounds the hormonal damage. The goal is consistency over months and years, not perfection over any given week.</p>'
      },
    ]
  },
];

const container = document.getElementById('faq-container');

faqs.forEach((cat, ci) => {
  const section = document.createElement('div');
  section.className = 'faq-category';
  section.innerHTML = '<h2 class="faq-category-title"><span class="cat-num">0' + (ci+1) + '</span>' + cat.category + '</h2>';

  cat.items.forEach((item, ii) => {
    const div = document.createElement('div');
    div.className = 'faq-item';
    div.innerHTML = `
      <button class="faq-question" onclick="toggle(this)">
        <span>${item.q}</span>
        <span class="faq-icon">+</span>
      </button>
      <div class="faq-answer"><p>${item.a}</p></div>
    `;
    // Fix: answer already has p tags from data
    div.querySelector('.faq-answer').innerHTML = item.a;
    section.appendChild(div);
  });

  container.appendChild(section);
});

function toggle(btn) {
  const item = btn.closest('.faq-item');
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(el => el.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
}
</script>
</body>
</html>
