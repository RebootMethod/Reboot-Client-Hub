<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Reboot Glossary — Reboot Method</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* Reboot Method — Shared Guide Styles */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #181818;
  --border: #1e1e1e;
  --border-light: #282828;
  --text: #f5f5f0;
  --muted: rgba(245,245,240,0.45);
  --muted2: rgba(245,245,240,0.2);
  --yellow: #FFE033;
  --yellow-dim: rgba(255,224,51,0.08);
  --yellow-mid: rgba(255,224,51,0.15);
}

html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; scroll-behavior: smooth; }

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse 100% 40% at 50% 0%, rgba(255,224,51,0.05) 0%, transparent 65%),
    var(--bg);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(245,245,240,0.055) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  z-index: 0;
}

.wrap { max-width: 820px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

/* NAV */
.top-nav {
  padding: 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  letter-spacing: 0.04em;
  transition: color 0.2s;
}
.back-link:hover { color: var(--yellow); }
.back-link svg { transition: transform 0.2s; }
.back-link:hover svg { transform: translateX(-3px); }

.brand-mark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.12em;
  color: var(--yellow);
  opacity: 0.65;
}

/* HERO */
.page-hero {
  padding: 56px 0 48px;
  border-bottom: 1px solid var(--border);
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--yellow);
  margin-bottom: 18px;
}
.hero-eyebrow::before {
  content: '';
  display: block;
  width: 18px;
  height: 1px;
  background: var(--yellow);
}

.page-hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5.5vw, 3.2rem);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.01em;
  margin-bottom: 16px;
}
.page-hero h1 em { font-style: italic; color: var(--yellow); }

.hero-intro {
  font-size: 1rem;
  color: var(--muted);
  line-height: 1.7;
  max-width: 600px;
  font-weight: 400;
}

/* KEY TAKEAWAYS BOX */
.takeaways {
  background: var(--yellow-dim);
  border: 1px solid rgba(255,224,51,0.18);
  border-left: 3px solid var(--yellow);
  border-radius: 4px;
  padding: 24px 28px;
  margin: 40px 0;
}
.takeaways-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--yellow);
  margin-bottom: 14px;
}
.takeaways ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.takeaways ul li {
  font-size: 0.88rem;
  color: var(--text);
  line-height: 1.55;
  padding-left: 20px;
  position: relative;
}
.takeaways ul li::before {
  content: '→';
  position: absolute;
  left: 0;
  color: var(--yellow);
  font-size: 0.8rem;
}

/* CONTENT SECTIONS */
.content-body { padding: 48px 0 80px; }

.guide-section { margin-bottom: 52px; }
.guide-section:last-child { margin-bottom: 0; }

.section-header {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.section-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  color: var(--yellow);
  opacity: 0.35;
  line-height: 1;
  flex-shrink: 0;
}
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text);
}

.guide-section p {
  font-size: 0.92rem;
  line-height: 1.75;
  color: rgba(245,245,240,0.8);
  margin-bottom: 16px;
}
.guide-section p:last-child { margin-bottom: 0; }

.guide-section p strong { color: var(--text); font-weight: 600; }

/* CALLOUT BLOCK */
.callout {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 4px;
  padding: 20px 24px;
  margin: 20px 0;
}
.callout-label {
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--yellow);
  margin-bottom: 8px;
}
.callout p { font-size: 0.88rem; color: var(--muted); margin: 0; }

/* PILLAR GRID */
.pillar-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  margin: 20px 0;
}
.pillar-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 4px;
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.pillar-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--yellow);
  opacity: 0.5;
}
.pillar-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  color: var(--yellow);
  opacity: 0.2;
  line-height: 1;
  margin-bottom: 6px;
}
.pillar-name {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.pillar-desc { font-size: 0.77rem; color: var(--muted); line-height: 1.5; }

/* RULE LIST */
.rule-list { list-style: none; display: flex; flex-direction: column; gap: 14px; margin: 20px 0; }
.rule-list li {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  font-size: 0.9rem;
  line-height: 1.6;
  color: rgba(245,245,240,0.8);
}
.rule-list li .rule-badge {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  background: var(--yellow-dim);
  border: 1px solid rgba(255,224,51,0.2);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--yellow);
  margin-top: 2px;
}

/* FOOTER */
footer {
  border-top: 1px solid var(--border);
  padding: 28px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.footer-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.95rem;
  letter-spacing: 0.1em;
  color: var(--yellow);
  opacity: 0.5;
}
.footer-copy { font-size: 0.62rem; color: var(--muted2); }

@media (max-width: 600px) {
  .pillar-grid { grid-template-columns: 1fr; }
  .page-hero { padding: 40px 0 36px; }
}
@media (prefers-reduced-motion: reduce) {
  .back-link svg { transition: none; }
}

.glossary-body { padding: 40px 0 80px; }
.search-bar-wrap { margin-bottom: 32px; position: relative; }
.search-bar-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 3px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.92rem;
  padding: 12px 16px 12px 42px;
  outline: none;
  transition: border-color 0.2s;
}
.search-bar-wrap input:focus { border-color: rgba(255,224,51,0.4); }
.search-bar-wrap input::placeholder { color: var(--muted2); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted2); pointer-events: none; }

.alpha-nav { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 32px; }
.alpha-btn {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; font-weight: 700;
  border: 1px solid var(--border-light);
  border-radius: 3px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
}
.alpha-btn:hover, .alpha-btn.active { border-color: var(--yellow); color: var(--yellow); background: var(--yellow-dim); }

.alpha-group { margin-bottom: 40px; }
.alpha-group-letter {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  color: var(--yellow);
  opacity: 0.25;
  margin-bottom: 12px;
  line-height: 1;
}
.term-list { display: flex; flex-direction: column; gap: 0; }
.term-item {
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 20px;
  align-items: baseline;
}
.term-item:last-child { border-bottom: none; }
.term-name { font-size: 0.88rem; font-weight: 700; color: var(--text); }
.term-tag { display: inline-block; font-size: 0.55rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--yellow); background: var(--yellow-dim); padding: 2px 6px; border-radius: 2px; margin-left: 8px; vertical-align: middle; }
.term-def { font-size: 0.85rem; color: rgba(245,245,240,0.75); line-height: 1.65; }
.term-item.hidden { display: none; }

#no-results { display: none; font-size: 0.88rem; color: var(--muted); padding: 20px 0; }

@media(max-width:560px){ .term-item { grid-template-columns: 1fr; gap: 6px; } }
</style>
</head>
<body>
<div class="wrap">

  <nav class="top-nav">
    <a href="index.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to Resources
    </a>
    <span class="brand-mark">REBOOT METHOD</span>
  </nav>

  <section class="page-hero">
    <p class="hero-eyebrow">Reference</p>
    <h1>The Reboot<br><em>Glossary</em></h1>
    <p class="hero-intro">Plain-English definitions of every term used in the Reboot Method system. If your coach says something you don't recognise, it's in here.</p>
  </section>

  <div class="glossary-body">

    <div class="search-bar-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input type="text" id="glossary-search" placeholder="Search terms…" oninput="filterGlossary(this.value)">
    </div>

    <div id="no-results">No terms match your search.</div>
    <div id="glossary-content"></div>

  </div>

  <footer>
    <span class="footer-brand">REBOOT METHOD</span>
    <span class="footer-copy">© 2026 The Reboot Method. All rights reserved.</span>
  </footer>

</div>

<script>
const terms = [
  { term: 'Aromatase', tag: 'Hormones', def: 'An enzyme that converts testosterone into oestrogen (estradiol). Found in high concentrations in visceral fat — one reason why reducing body fat improves the testosterone-to-oestrogen ratio.' },
  { term: 'Basal Metabolic Rate (BMR)', tag: 'Metabolism', def: 'The number of calories your body burns at rest to maintain basic physiological functions — breathing, circulation, cellular repair. Suppressed in men with low waking temperature.' },
  { term: 'Body Recomposition', tag: 'Training', def: 'The simultaneous process of building lean muscle mass and reducing body fat. Possible without a calorie deficit when nutrition is optimised and training is structured correctly. DEXA scans are essential for tracking true recomp progress.' },
  { term: 'Carb Cycling', tag: 'Nutrition', def: 'A nutrition strategy that varies carbohydrate intake across the week based on training demand. Higher carbs on training days support performance and glycogen replenishment; lower carbs on rest days can support fat oxidation.' },
  { term: 'Collagen Peptides', tag: 'Supplements', def: 'Hydrolysed collagen protein that supports connective tissue repair (tendons, ligaments, cartilage). Most effective when taken within 60 minutes post-training alongside vitamin C, which drives collagen synthesis.' },
  { term: 'Cortisol', tag: 'Hormones', def: 'The body\'s primary stress hormone. Released in response to physical, psychological, or physiological stress. Chronically elevated cortisol suppresses testosterone, drives fat storage around the abdomen, fragments sleep, and impairs recovery.' },
  { term: 'Creatine Monohydrate', tag: 'Supplements', def: 'The most researched performance supplement in existence. Increases phosphocreatine stores in muscle tissue, directly improving output in high-intensity training. Also has cognitive benefits. 5g daily, no loading phase required.' },
  { term: 'DEXA Scan', tag: 'Tracking', def: 'Dual-energy X-ray absorptiometry. The gold-standard body composition assessment tool. Measures lean mass, fat mass, bone mineral density, and visceral fat — broken down by body region. Far more informative than scale weight alone.' },
  { term: 'DHEA-S', tag: 'Hormones', def: 'Dehydroepiandrosterone sulfate. A precursor hormone produced by the adrenal glands that declines with age and chronic stress. Low DHEA-S alongside elevated cortisol indicates adrenal stress and HPA axis dysregulation.' },
  { term: 'Double-Progression', tag: 'Training', def: 'The training progression method used in the Reboot app. Step 1: hit the top of your target rep range across all sets. Step 2: increase the load by the smallest available increment next session. Repeat.' },
  { term: 'Deload Week', tag: 'Training', def: 'A planned week of reduced training volume and intensity (typically 40–50% reduction) programmed every 4–6 weeks. Not optional rest — it is when training adaptations consolidate. Skipping deloads is one of the most common reasons progress stalls.' },
  { term: 'e1RM', tag: 'Training', def: 'Estimated one-rep maximum. The maximum weight you could lift for a single rep, predicted from a submaximal set using the Epley formula: weight × (1 + reps/30). Used to set working weights across rep ranges.' },
  { term: 'Free Testosterone', tag: 'Hormones', def: 'The biologically active fraction of testosterone not bound to SHBG or albumin. More clinically relevant than total testosterone. Optimal range for active men: 20–30 pg/mL.' },
  { term: 'FSH', tag: 'Hormones', def: 'Follicle-stimulating hormone. Produced by the pituitary. In men, FSH stimulates sperm production. Low LH and FSH alongside low testosterone indicates secondary (central) hypogonadism rather than primary testicular failure.' },
  { term: 'Glycogen', tag: 'Nutrition', def: 'The stored form of carbohydrate in muscle and liver tissue. The primary fuel for high-intensity training. Depleted during exercise and replenished through carbohydrate intake. Low glycogen produces flat, weak training sessions and slower recovery.' },
  { term: 'HbA1c', tag: 'Bloodwork', def: 'Glycated haemoglobin. Reflects average blood glucose levels over the past 3 months. An early marker of insulin resistance. Optimal: below 5.4%. Above 5.7% indicates prediabetes.' },
  { term: 'HPA Axis', tag: 'Hormones', def: 'The hypothalamic-pituitary-adrenal axis. The hormonal communication system between the brain and adrenal glands that regulates cortisol output. Chronic stress dysregulates this system, leading to elevated baseline cortisol and blunted stress response over time.' },
  { term: 'HRV (Heart Rate Variability)', tag: 'Tracking', def: 'The variation in time between consecutive heartbeats. A higher HRV indicates better autonomic nervous system function and recovery capacity. Used as a real-time recovery readout alongside waking temperature.' },
  { term: 'Ignition Protocol', tag: 'Reboot Method', def: 'The Reboot Method nutrition system. A pro-metabolic framework built around a 55% carb / 30% protein / 15% fat macro split, nutrient timing around training, and waking temperature as the primary feedback metric.' },
  { term: 'Insulin Resistance', tag: 'Metabolism', def: 'A state in which cells respond less effectively to insulin, requiring higher insulin output to manage blood glucose. Associated with elevated visceral fat, poor sleep, high sugar intake, and chronic stress. Fasting glucose above 100 mg/dL is an early indicator.' },
  { term: 'Lean Mass', tag: 'Tracking', def: 'Everything in the body that is not fat or bone — primarily muscle, plus organs, connective tissue, and water. The primary body composition metric tracked in recomposition phases. Measured accurately via DEXA scan.' },
  { term: 'LH (Luteinising Hormone)', tag: 'Hormones', def: 'Produced by the pituitary gland. In men, LH signals the testes to produce testosterone. Low LH alongside low testosterone points to secondary hypogonadism — a pituitary or hypothalamic issue rather than a testicular one.' },
  { term: 'LISS', tag: 'Training', def: 'Low-intensity steady-state cardio. Exercise performed at a conversational pace for sustained duration — walking, cycling, swimming. Preferred cardio modality in the Reboot Method because it does not compete with recovery from hypertrophy training.' },
  { term: 'Magnesium Glycinate', tag: 'Supplements', def: 'A highly bioavailable form of magnesium bonded to glycine. Preferred form for sleep quality, muscle recovery, and general supplementation. 300–400mg taken 30–60 minutes before sleep.' },
  { term: 'Metabolic Rate', tag: 'Metabolism', def: 'The rate at which the body produces and expends energy. Reflected in waking temperature and resting heart rate. Suppressed by chronic calorie restriction, poor sleep, high stress, and inadequate carbohydrate intake.' },
  { term: 'NEAT', tag: 'Training', def: 'Non-exercise activity thermogenesis. All movement outside of formal training — walking, fidgeting, standing, climbing stairs. Has a significant cumulative impact on daily calorie expenditure and body composition, independent of training.' },
  { term: 'Oestradiol (E2)', tag: 'Hormones', def: 'The primary form of oestrogen in men. Some oestrogen is essential for bone density, libido, and cardiovascular health. Elevated levels (above 40 pg/mL) are associated with high body fat, elevated aromatase activity, and reduced testosterone effect.' },
  { term: 'Progressive Overload', tag: 'Training', def: 'The principle of gradually increasing the training stimulus over time — through added weight, reps, sets, or reduced rest — to continue driving adaptation. Without progressive overload, training becomes maintenance rather than improvement.' },
  { term: 'Pro-Metabolic', tag: 'Reboot Method', def: 'A nutrition philosophy centred on providing the body with an abundance of the right fuel to support metabolism, rather than restricting calories to force fat loss. Prioritises thyroid function, hormonal health, and mitochondrial energy production.' },
  { term: 'Resting Heart Rate (RHR)', tag: 'Tracking', def: 'Heart rate measured at complete rest — ideally first thing in the morning before getting out of bed. A rising RHR alongside rising waking temperature indicates improved metabolic output. Chronically suppressed RHR below 55 bpm in a non-endurance athlete may indicate metabolic suppression.' },
  { term: 'Reverse T3 (rT3)', tag: 'Bloodwork', def: 'An inactive form of thyroid hormone produced as a stress response. Elevated reverse T3 blocks active T3 from binding to receptors, effectively suppressing thyroid function even when TSH appears normal. Associated with chronic calorie restriction and high cortisol.' },
  { term: 'SHBG', tag: 'Hormones', def: 'Sex hormone-binding globulin. A protein that binds testosterone in the bloodstream and renders it biologically inactive. Elevated SHBG (above 55 nmol/L) significantly reduces free testosterone even when total testosterone appears normal.' },
  { term: 'T3 (Triiodothyronine)', tag: 'Bloodwork', def: 'The active thyroid hormone. Converted from T4 in the liver and peripheral tissues. Directly drives cellular metabolic rate. Optimal free T3: 3.5–4.5 pg/mL. Rarely tested by GPs — request it specifically alongside TSH and T4.' },
  { term: 'T4 (Thyroxine)', tag: 'Bloodwork', def: 'The precursor thyroid hormone produced by the thyroid gland. Must be converted to the active T3 to have metabolic effect. Conversion is impaired by chronic stress, calorie restriction, selenium deficiency, and elevated cortisol.' },
  { term: 'Total Daily Energy Expenditure (TDEE)', tag: 'Nutrition', def: 'The total number of calories burned per day including BMR plus all activity. Used as the basis for setting calorie targets. In the Reboot protocol, intake is set at or near TDEE — never in a significant deficit.' },
  { term: 'TSH (Thyroid Stimulating Hormone)', tag: 'Bloodwork', def: 'Produced by the pituitary gland to signal the thyroid to produce T4 and T3. The most commonly tested thyroid marker. Optimal: 0.5–2.0 mIU/L. A normal TSH does not rule out suboptimal free T3.' },
  { term: 'Visceral Fat', tag: 'Tracking', def: 'Fat stored around the abdominal organs (liver, pancreas, intestines). Metabolically active and inflammatory. Associated with insulin resistance, elevated aromatase activity, suppressed testosterone, and cardiovascular disease risk. Measured via DEXA scan.' },
  { term: 'Vitamin D3', tag: 'Supplements', def: 'A fat-soluble vitamin that functions as a hormone in the body. Has receptors throughout the body including the testes, where it supports testosterone synthesis. Deficiency is extremely common. Optimal serum level: 50–80 ng/mL.' },
  { term: 'Waking Temperature', tag: 'Tracking', def: 'Oral temperature taken within 5 minutes of waking, before getting out of bed. The primary metabolic health metric in the Reboot Method. Optimal: 36.6–37.0°C. Readings below 36.3°C indicate metabolic suppression.' },
  { term: 'Zinc', tag: 'Supplements', def: 'An essential mineral required for testosterone synthesis, immune function, protein metabolism, and wound healing. Commonly deficient in active men with high training volume. Optimal serum level: 80–120 mcg/dL. Do not exceed 40mg/day supplemental zinc.' },
].sort((a,b) => a.term.localeCompare(b.term));

function buildGlossary(filtered) {
  const container = document.getElementById('glossary-content');
  container.innerHTML = '';
  if (!filtered.length) {
    document.getElementById('no-results').style.display = 'block';
    return;
  }
  document.getElementById('no-results').style.display = 'none';

  const groups = {};
  filtered.forEach(t => {
    const letter = t.term[0].toUpperCase();
    if (!groups[letter]) groups[letter] = [];
    groups[letter].push(t);
  });

  Object.keys(groups).sort().forEach(letter => {
    const group = document.createElement('div');
    group.className = 'alpha-group';
    group.id = 'letter_' + letter;
    group.innerHTML = '<div class="alpha-group-letter">' + letter + '</div><div class="term-list">' +
      groups[letter].map(t => `
        <div class="term-item">
          <div class="term-name">${t.term}<span class="term-tag">${t.tag}</span></div>
          <div class="term-def">${t.def}</div>
        </div>
      `).join('') +
    '</div>';
    container.appendChild(group);
  });
}

function filterGlossary(q) {
  const query = q.toLowerCase().trim();
  const filtered = query ? terms.filter(t =>
    t.term.toLowerCase().includes(query) ||
    t.def.toLowerCase().includes(query) ||
    t.tag.toLowerCase().includes(query)
  ) : terms;
  buildGlossary(filtered);
}

buildGlossary(terms);
</script>
</body>
</html>
